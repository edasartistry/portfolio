<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Edasartistry - Gravity Falls Portal</title>
    
    <style>
        /* ========== RESET ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* ========== FONTS ========== */
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Patrick+Hand&family=Rock+Salt&display=swap');
        
        :root {
            --primary: #ff6b9d;
            --secondary: #00ccff;
            --accent: #b537f2;
            --pine: #ffd966;
            --sky: #ff99c8;
            --mystery: #a0e7e5;
            --journal: #ffffff;
            --wood: #ffb347;
            --shadow: #4a154b;
            --cipher: #39ff14;
        }
        
        body {
            font-family: 'Patrick Hand', 'Courier New', cursive;
            background-color: var(--shadow);
            background-image: 
                repeating-linear-gradient(45deg,
                    rgba(255,107,157,0.12) 0px,
                    rgba(255,107,157,0.12) 20px,
                    rgba(0,204,255,0.12) 20px,
                    rgba(0,204,255,0.12) 40px
                );
            background-size: 80px 80px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            width: 100%;
        }
        
        /* Эффект старой плёнки */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg,
                rgba(255,105,180,0.05) 0px,
                rgba(255,105,180,0.05) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 9999;
        }
        
        /* ========== ЗВЕЗДОЧКИ ========== */
        .star {
            position: fixed;
            font-size: 24px;
            user-select: none;
            pointer-events: none;
            z-index: 5;
            opacity: 0.6;
            color: var(--cipher);
            text-shadow: 0 0 10px var(--accent);
            filter: drop-shadow(0 0 5px var(--secondary));
            will-change: transform;
            animation: floatStar linear infinite;
        }
        
        @keyframes floatStar {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -20px) rotate(15deg); }
            50% { transform: translate(60px, 0) rotate(30deg); }
            75% { transform: translate(30px, 20px) rotate(15deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        
        /* ========== АНИМАЦИИ ========== */
        @keyframes float {
            0% { transform: translateY(0px) rotate(-2deg); }
            50% { transform: translateY(-15px) rotate(-2deg); }
            100% { transform: translateY(0px) rotate(-2deg); }
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes flicker {
            0% { opacity: 1; }
            25% { opacity: 0.7; }
            50% { opacity: 1; }
            75% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        
        @keyframes glow {
            0% { text-shadow: 0 0 5px var(--accent); }
            50% { text-shadow: 0 0 30px var(--accent), 0 0 50px var(--primary); }
            100% { text-shadow: 0 0 5px var(--accent); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        
        @keyframes appear {
            from { opacity: 0; transform: translateY(30px) rotate(-2deg); }
            to { opacity: 1; transform: translateY(0) rotate(0deg); }
        }
        
        @keyframes cyberpunkGlow {
            0% { filter: drop-shadow(0 0 5px var(--secondary)); }
            50% { filter: drop-shadow(0 0 20px var(--accent)); }
            100% { filter: drop-shadow(0 0 5px var(--secondary)); }
        }
        
        @keyframes kawaiiBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* ========== MAIN CONTAINER ========== */
        .journal-container {
            max-width: 1400px;
            width: 95%;
            margin: 20px auto;
            background: var(--journal);
            background-image: 
                radial-gradient(circle at 20px 20px, rgba(255,217,102,0.25) 2px, transparent 2px),
                linear-gradient(var(--journal), rgba(255,153,200,0.12));
            background-size: 40px 40px, 100%;
            border: 15px solid var(--primary);
            border-radius: 50px;
            box-shadow: 20px 20px 40px rgba(74,21,75,0.5), inset 0 0 80px rgba(181,55,242,0.12);
            position: relative;
            padding: 0 20px;
            animation: appear 0.8s ease-out;
            z-index: 10;
        }
        
        @media (max-width: 768px) {
            .journal-container {
                width: 98%;
                margin: 10px auto;
                border-width: 10px;
                padding: 0 10px;
                border-radius: 40px;
            }
        }
        
        /* Уголки дневника */
        .journal-corner {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 5px solid var(--accent);
            opacity: 0.3;
            z-index: 10;
        }
        
        @media (max-width: 768px) {
            .journal-corner {
                width: 40px;
                height: 40px;
                border-width: 4px;
            }
        }
        
        .corner-tl { top: -8px; left: -8px; border-right: none; border-bottom: none; }
        .corner-tr { top: -8px; right: -8px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: -8px; left: -8px; border-right: none; border-top: none; }
        .corner-br { bottom: -8px; right: -8px; border-left: none; border-top: none; }
        
        /* Билл Шифр */
        .bill-cipher {
            position: fixed;
            width: 100px;
            height: 100px;
            background: var(--cipher);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            opacity: 0.15;
            right: 20px;
            bottom: 20px;
            animation: spin 20s linear infinite, cyberpunkGlow 4s infinite;
            cursor: pointer;
            z-index: 10000;
            transition: all 0.3s;
        }
        
        @media (max-width: 768px) {
            .bill-cipher {
                width: 70px;
                height: 70px;
                right: 10px;
                bottom: 10px;
            }
        }
        
        .bill-cipher:hover {
            opacity: 1;
            animation: shake 0.5s infinite, spin 1s linear infinite;
            width: 120px;
            height: 120px;
        }
        
        .bill-cipher::before {
            content: "▲";
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--shadow);
            font-size: 2em;
            font-weight: bold;
        }
        
        .bill-cipher::after {
            content: "BILL";
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            color: var(--shadow);
            font-size: 0.7em;
            font-weight: bold;
        }
        
        /* ========== HEADER ========== */
        .site-header {
            text-align: center;
            padding: 30px 10px;
            position: relative;
        }
        
        .site-title {
            font-family: 'Rock Salt', cursive;
            font-size: 4em;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 
                4px 4px 0 var(--primary),
                7px 7px 0 var(--secondary),
                10px 10px 10px var(--shadow);
            letter-spacing: 5px;
            transform: rotate(-2deg);
            display: inline-block;
            padding: 0 30px;
            background: rgba(255,255,255,0.2);
            border-radius: 60px;
            margin-bottom: 20px;
            animation: float 5s ease-in-out infinite, cyberpunkGlow 3s infinite;
            border: 3px solid var(--secondary);
            word-break: break-word;
            max-width: 100%;
        }
        
        @media (max-width: 1024px) {
            .site-title { font-size: 3em; }
        }
        
        @media (max-width: 768px) {
            .site-title {
                font-size: 2.2em;
                padding: 10px 20px;
            }
        }
        
        .site-title::before,
        .site-title::after {
            content: "★";
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5em;
            color: var(--cipher);
            text-shadow: 2px 2px 0 var(--secondary);
            animation: spin 6s linear infinite;
        }
        
        .site-title::before { left: -15px; }
        .site-title::after { right: -15px; }
        
        /* ========== НАВИГАЦИЯ ========== */
        .nav-bar {
            margin: 15px 0 20px;
            padding: 20px;
            background: var(--pine);
            border: 6px dashed var(--accent);
            border-radius: 60px;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,204,255,0.5);
            animation: pulse 4s infinite;
            width: 100%;
            overflow: hidden;
        }
        
        @media (max-width: 768px) {
            .nav-bar {
                padding: 15px;
                border-width: 4px;
                border-radius: 40px;
            }
        }
        
        .nav-menu {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            list-style: none;
            width: 100%;
        }
        
        @media (max-width: 768px) {
            .nav-menu {
                flex-direction: column;
                gap: 10px;
            }
            .nav-item {
                width: 100%;
            }
        }
        
        .nav-link {
            display: block;
            padding: 12px 20px;
            background: var(--journal);
            color: var(--primary);
            text-decoration: none;
            font-size: 1.1em;
            font-weight: bold;
            border: 4px solid var(--secondary);
            border-radius: 40px;
            transform: rotate(var(--rot, 0deg));
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 5px 5px 0 var(--secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        
        @media (max-width: 768px) {
            .nav-link {
                white-space: normal;
                text-align: center;
                width: 100%;
                transform: rotate(0deg) !important;
            }
        }
        
        .nav-link:hover {
            transform: rotate(0deg) scale(1.1);
            background: var(--accent);
            color: var(--journal);
            box-shadow: 8px 8px 0 var(--primary);
            border-color: var(--primary);
        }
        
        .nav-link.active {
            background: var(--accent);
            color: var(--journal);
            border-color: var(--primary);
            box-shadow: inset 3px 3px 8px var(--shadow);
            transform: rotate(0deg) scale(1.05);
        }
        
        /* ========== КОНТЕНТ ========== */
        .content-section {
            padding: 30px;
            margin: 30px 0;
            background: rgba(255,255,255,0.8);
            border: 5px dotted var(--primary);
            border-radius: 50px;
            position: relative;
            backdrop-filter: blur(3px);
            animation: appear 0.6s ease-out;
            width: 100%;
            overflow-x: hidden;
            z-index: 20;
        }
        
        @media (max-width: 768px) {
            .content-section {
                padding: 20px 15px;
                margin: 20px 0;
                border-width: 4px;
                border-radius: 30px;
            }
        }
        
        .section-title {
            font-family: 'Special Elite', cursive;
            font-size: 2.5em;
            color: var(--primary);
            text-shadow: 2px 2px 0 var(--accent);
            margin-bottom: 30px;
            border-bottom: 4px solid var(--secondary);
            padding-bottom: 12px;
            display: inline-block;
            position: relative;
            word-break: break-word;
        }
        
        @media (max-width: 768px) {
            .section-title {
                font-size: 1.8em;
            }
        }
        
        .section-title::after {
            content: "⬟";
            position: absolute;
            right: -30px;
            top: 0;
            font-size: 1.2em;
            color: var(--cipher);
            opacity: 0.5;
        }
        
        /* ========== ГАЛЕРЕЯ ========== */
        .gallery-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0 30px;
            justify-content: center;
            width: 100%;
        }
        
        .filter-btn {
            padding: 12px 20px;
            background: var(--journal);
            border: 3px solid var(--primary);
            border-radius: 40px;
            color: var(--primary);
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        @media (max-width: 768px) {
            .filter-btn {
                padding: 10px 15px;
                font-size: 0.9em;
                min-width: calc(50% - 10px);
            }
        }
        
        .filter-btn:hover,
        .filter-btn.active {
            background: var(--primary);
            color: var(--journal);
            border-color: var(--accent);
            transform: scale(1.05) rotate(1deg);
            box-shadow: 5px 5px 0 var(--secondary);
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin: 30px 0;
        }
        
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .gallery-item {
            background: var(--journal);
            border: 5px solid var(--secondary);
            border-radius: 35px;
            overflow: hidden;
            transform: rotate(var(--rot, -1deg));
            transition: all 0.4s;
            box-shadow: 10px 10px 0 var(--primary);
            animation: appear 0.5s ease-out;
        }
        
        .gallery-item:nth-child(even) {
            --rot: 2deg;
        }
        
        .gallery-item:hover {
            transform: rotate(0deg) scale(1.02);
            box-shadow: 15px 15px 0 var(--accent);
            border-color: var(--primary);
        }
        
        .gallery-image {
            height: 200px;
            background: var(--pine);
            position: relative;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 30% 30%, var(--accent) 10px, transparent 10px),
                linear-gradient(45deg, var(--primary) 0%, var(--mystery) 100%);
        }
        
        .gallery-emoji {
            font-size: 4em;
            z-index: 2;
            transition: all 0.3s;
        }
        
        .gallery-item:hover .gallery-emoji {
            transform: scale(1.1) rotate(5deg);
        }
        
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(74,21,75,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 3;
        }
        
        .gallery-image:hover .gallery-overlay {
            opacity: 1;
        }
        
        .gallery-icon {
            font-size: 2.5em;
            color: var(--cipher);
            animation: kawaiiBounce 1s infinite;
        }
        
        .gallery-year {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--secondary);
            color: white;
            padding: 4px 12px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.9em;
            z-index: 2;
        }
        
        .gallery-info {
            padding: 15px;
        }
        
        .gallery-info h3 {
            font-size: 1.3em;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .gallery-info p {
            color: var(--secondary);
            font-size: 0.95em;
        }
        
        /* ========== МОДАЛЬНОЕ ОКНО ========== */
        .modal {
            display: none;
            position: fixed;
            z-index: 10001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(74,21,75,0.94);
            animation: flicker 0.3s;
            overflow-y: auto;
            padding: 20px;
        }
        
        .modal-content {
            background: var(--journal);
            margin: 20px auto;
            padding: 30px;
            border: 15px solid var(--secondary);
            border-radius: 60px;
            width: 90%;
            max-width: 600px;
            position: relative;
            animation: appear 0.4s;
            box-shadow: 25px 25px 50px var(--shadow);
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .modal-content {
                padding: 20px 15px;
                border-width: 10px;
                border-radius: 40px;
            }
        }
        
        .modal-close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 2.5em;
            cursor: pointer;
            color: var(--primary);
            transition: all 0.3s;
        }
        
        .modal-close:hover {
            color: var(--cipher);
            transform: scale(1.2) rotate(90deg);
        }
        
        .modal-emoji {
            font-size: 6em;
            margin: 20px 0;
            animation: spin 6s linear infinite;
        }
        
        .modal-body h2 {
            font-size: 2em;
            color: var(--primary);
            margin-bottom: 15px;
        }
        
        .modal-story {
            font-style: italic;
            background: rgba(181,55,242,0.1);
            padding: 15px;
            border-radius: 20px;
            margin: 15px 0;
        }
        
        .modal-year {
            display: inline-block;
            background: var(--primary);
            color: var(--journal);
            padding: 8px 25px;
            border-radius: 40px;
            margin-top: 15px;
        }
        
        /* ========== ABOUT ========== */
        .about-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }
        
        @media (max-width: 1024px) {
            .about-container {
                grid-template-columns: 1fr;
            }
        }
        
        .about-image {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .polaroid {
            background: var(--journal);
            padding: 15px 15px 30px;
            border: 5px solid var(--secondary);
            transform: rotate(-3deg);
            box-shadow: 15px 15px 0 var(--primary);
            transition: all 0.4s;
            cursor: pointer;
            max-width: 300px;
        }
        
        .polaroid:hover {
            transform: rotate(0deg) scale(1.05);
            box-shadow: 20px 20px 0 var(--accent);
        }
        
        .polaroid-image {
            height: 280px;
            background: var(--pine);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5em;
            background-image: radial-gradient(circle at 30% 30%, var(--accent) 15px, transparent 15px),
                linear-gradient(45deg, var(--primary) 0%, var(--mystery) 100%);
            border-radius: 5px;
        }
        
        .badge-logo {
            width: 80px;
            height: 80px;
            margin: 10px auto;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            border: 3px solid var(--cipher);
        }
        
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 300px;
        }
        
        .social-link {
            padding: 12px;
            background: var(--journal);
            border: 3px solid var(--secondary);
            border-radius: 40px;
            color: var(--primary);
            text-decoration: none;
            text-align: center;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .social-link:hover {
            background: var(--accent);
            color: var(--journal);
            transform: scale(1.05);
            border-color: var(--primary);
        }
        
        .about-greeting {
            font-size: 1.8em;
            color: var(--accent);
            text-shadow: 2px 2px 0 var(--primary);
            margin-bottom: 20px;
        }
        
        .about-paragraph {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .about-quote {
            margin: 30px 0;
            padding: 25px;
            background: rgba(255,217,102,0.2);
            border-left: 6px solid var(--accent);
            border-radius: 20px;
            font-style: italic;
            font-size: 1.2em;
        }
        
        .quote-author {
            text-align: right;
            margin-top: 10px;
            font-style: normal;
            color: var(--primary);
        }
        
        .about-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        
        @media (max-width: 768px) {
            .about-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        .stat-item {
            text-align: center;
            background: var(--journal);
            padding: 15px;
            border-radius: 25px;
            border: 3px solid var(--secondary);
            transition: all 0.3s;
        }
        
        .stat-item:hover {
            transform: scale(1.05) rotate(1deg);
            border-color: var(--accent);
            box-shadow: 5px 5px 0 var(--primary);
        }
        
        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 0.9em;
            color: var(--primary);
        }
        
        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        
        .skill-tag {
            padding: 8px 15px;
            background: var(--journal);
            border: 2px solid var(--secondary);
            border-radius: 30px;
            color: var(--primary);
            font-weight: bold;
            font-size: 0.9em;
        }
        
        .testimonials {
            margin-top: 30px;
        }
        
        .testimonials h4 {
            font-size: 1.3em;
            color: var(--primary);
            margin-bottom: 15px;
        }
        
        .testimonial-item {
            background: rgba(255,217,102,0.2);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent);
        }
        
        .testimonial-author {
            text-align: right;

                            'Камень желаний', 'Следы дракона', 'Вход в пещеру', 'Старый колодец', 'Зарыто сокровище',
                            'Место силы', 'Гномий совет', 'Проклятое место', 'Феи живут здесь', 'Летающая тарелка',
                            'Секретный вход', 'Магический круг', 'Тень Билла', 'Страница 19', 'Послание из космоса'
                        ];
                        let mapHtml = '';
                        for(let i = 1; i <= 20; i++) {
                            mapHtml += `<div class="map-cell" onclick="revealSecret(this, ${i}, '${secretMessages[i-1]}')"><div class="map-marker">?</div><div class="map-tooltip">${secretMessages[i-1]}</div></div>`;
                        }
                        mapGrid.innerHTML = mapHtml;
                    }
                }, 10);
            }
            else if(currentPage === 'illustrations') {
                html = `<div class="content-section">
                    <h2 class="section-title">✏️ ILLUSTRATIONS - ГАЛЕРЕЯ</h2>
                    <div class="illustrations-intro">
                        <p class="intro-big">ПОЛНАЯ КОЛЛЕКЦИЯ РАБОТ</p>
                        <p>Более 100 иллюстраций в разных стилях и техниках. От быстрых набросков до детальных полотен.</p>
                    </div>
                    <div class="illustrations-filter">
                        <button class="filter-btn active" data-filter="all">Все (124)</button>
                        <button class="filter-btn" data-filter="2024">2024 (34)</button>
                        <button class="filter-btn" data-filter="2023">2023 (42)</button>
                        <button class="filter-btn" data-filter="2022">2022 (28)</button>
                        <button class="filter-btn" data-filter="portrait">Портреты (45)</button>
                        <button class="filter-btn" data-filter="landscape">Пейзажи (52)</button>
                        <button class="filter-btn" data-filter="sketch">Наброски (27)</button>
                    </div>
                    <div class="masonry-grid" id="masonryGrid"></div>
                    <div class="pagination">
                        <a href="#" class="page-link active">1</a>
                        <a href="#" class="page-link">2</a>
                        <a href="#" class="page-link">3</a>
                        <a href="#" class="page-link">4</a>
                        <a href="#" class="page-link">5</a>
                        <span class="page-dots">...</span>
                        <a href="#" class="page-link">12</a>
                        <a href="#" class="page-link">13</a>
                    </div>
                </div>`;
                setTimeout(() => {
                    const grid = document.getElementById('masonryGrid');
                    if(grid) {
                        const styles = ['portrait', 'landscape', 'square', 'wide', 'sketch'];
                        let illusHtml = '';
                        for(let i = 0; i < illustrationTitles.length; i++) {
                            const style = styles[i % styles.length];
                            const year = 2020 + (i % 5);
                            const category = style === 'portrait' ? 'portrait' : (style === 'landscape' ? 'landscape' : 'sketch');
                            illusHtml += `
                                <div class="masonry-item ${style}" data-year="${year}" data-category="${category}">
                                    <div class="masonry-image">
                                        <div class="masonry-overlay"><span class="masonry-view">🔍</span></div>
                                        <div class="masonry-year">${year}</div>
                                        <div class="masonry-emoji">🎨</div>
                                    </div>
                                    <div class="masonry-info">
                                        <h4>${illustrationTitles[i]}</h4>
                                        <p>№${String(i + 1).padStart(3, '0')} • ${category}</p>
                                    </div>
                                </div>
                            `;
                        }
                        grid.innerHTML = illusHtml;
                        applyFilters('.masonry-item', 'year');
                    }
                }, 10);
            }
            
            document.getElementById('mainContent').innerHTML = html;
        }
        
        // Инициализация
        window.addEventListener('load', () => {
            renderNav();
            renderContent();
            document.getElementById('randomCounter').innerText = Math.floor(3000 + Math.random() * 7000);
            
            // Обработка кликов по навигации
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    const href = link.getAttribute('href');
                    if(href && href.includes('?page=')) {
                        e.preventDefault();
                        currentPage = href.split('?page=')[1];
                        history.pushState({}, '', href);
                        renderNav();
                        renderContent();
                    }
                });
            });
            
            // Консольные пасхалки
            console.log('%c🔍 ТЫ НАШЁЛ СЕКРЕТНУЮ КОНСОЛЬ!', 'font-size: 20px; color: #b537f2; text-shadow: 2px 2px 0 #ff6b9d;');
            console.log('%c⬟ Билл Шифр наблюдает за тобой...', 'font-size: 16px; color: #a0e7e5;');
            console.log('%c⬟◆⬟◆ ⬟⬟◆⬟ ◆⬟⬟◆ ⬟◆⬟⬟', 'font-size: 24px; color: #39ff14;');
            console.log('%cСтраница 19 - самая важная', 'font-size: 14px; color: #00ccff;');
            
            // Код Konami
            let konami = [];
            document.addEventListener('keydown', (e) => {
                konami.push(e.keyCode);
                if(konami.toString().indexOf('38,38,40,40,37,39,37,39,66,65') >= 0) {
                    alert('🎉 КОД АКТИВИРОВАН! ДОБРО ПОЖАЛОВАТЬ В ХИЖИНУ ТАЙН!');
                    document.body.style.animation = 'flicker 0.1s infinite';
                    const container = document.querySelector('.journal-container');
                    container.style.transform = 'rotate(360deg) scale(1.1)';
                    container.style.transition = 'all 1s';
                    setTimeout(() => {
                        document.body.style.animation = '';
                        container.style.transform = '';
                    }, 3000);
                    konami = [];
                }
            });
            
            // Периодическое создание звездочек
            setInterval(() => {
                if(Math.random() < 0.1) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.innerHTML = ['⭐','✨','🌟','💫'][Math.floor(Math.random() * 4)];
                    star.style.top = Math.random() * 100 + '%';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.animationDuration = (10 + Math.random() * 20) + 's';
                    star.style.fontSize = (15 + Math.random() * 25) + 'px';
                    document.body.appendChild(star);
                    setTimeout(() => star.remove(), 30000);
                }
            }, 2000);
        });
        
        window.onclick = (e) => { if(e.target === document.getElementById('imageModal')) closeModal(); };
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.billClick = billClick;
        window.revealSecret = revealSecret;
    </script>
</body>
</html>
