<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Edasartistry - Gravity Falls Portal</title>
    
    <style>
        /* ========== RESET ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* ========== FONTS ========== */
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Patrick+Hand&family=Rock+Salt&display=swap');
        
        :root {
            --primary: #ff6b9d;
            --secondary: #00ccff;
            --accent: #b537f2;
            --pine: #ffd966;
            --sky: #ff99c8;
            --mystery: #a0e7e5;
            --journal: #ffffff;
            --wood: #ffb347;
            --shadow: #4a154b;
            --cipher: #39ff14;
        }
        
        body {
            font-family: 'Patrick Hand', 'Courier New', cursive;
            background-color: var(--shadow);
            background-image: 
                repeating-linear-gradient(45deg,
                    rgba(255,107,157,0.12) 0px,
                    rgba(255,107,157,0.12) 20px,
                    rgba(0,204,255,0.12) 20px,
                    rgba(0,204,255,0.12) 40px
                );
            background-size: 80px 80px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            width: 100%;
        }
        
        /* Эффект старой плёнки */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg,
                rgba(255,105,180,0.05) 0px,
                rgba(255,105,180,0.05) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 9999;
        }
        
        /* ========== ЗВЕЗДОЧКИ ========== */
        .star {
            position: fixed;
            font-size: 24px;
            user-select: none;
            pointer-events: none;
            z-index: 5;
            opacity: 0.6;
            color: var(--cipher);
            text-shadow: 0 0 10px var(--accent);
            filter: drop-shadow(0 0 5px var(--secondary));
            will-change: transform;
            animation: floatStar linear infinite;
        }
        
        @keyframes floatStar {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -20px) rotate(15deg); }
            50% { transform: translate(60px, 0) rotate(30deg); }
            75% { transform: translate(30px, 20px) rotate(15deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        
        /* ========== АНИМАЦИИ ========== */
        @keyframes float {
            0% { transform: translateY(0px) rotate(-2deg); }
            50% { transform: translateY(-15px) rotate(-2deg); }
            100% { transform: translateY(0px) rotate(-2deg); }
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes flicker {
            0% { opacity: 1; }
            25% { opacity: 0.7; }
            50% { opacity: 1; }
            75% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        
        @keyframes glow {
            0% { text-shadow: 0 0 5px var(--accent); }
            50% { text-shadow: 0 0 30px var(--accent), 0 0 50px var(--primary); }
            100% { text-shadow: 0 0 5px var(--accent); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        
        @keyframes appear {
            from { opacity: 0; transform: translateY(30px) rotate(-2deg); }
            to { opacity: 1; transform: translateY(0) rotate(0deg); }
        }
        
        @keyframes cyberpunkGlow {
            0% { filter: drop-shadow(0 0 5px var(--secondary)); }
            50% { filter: drop-shadow(0 0 20px var(--accent)); }
            100% { filter: drop-shadow(0 0 5px var(--secondary)); }
        }
        
        @keyframes kawaiiBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* ========== MAIN CONTAINER ========== */
        .journal-container {
            max-width: 1400px;
            width: 95%;
            margin: 20px auto;
            background: var(--journal);
            background-image: 
                radial-gradient(circle at 20px 20px, rgba(255,217,102,0.25) 2px, transparent 2px),
                linear-gradient(var(--journal), rgba(255,153,200,0.12));
            background-size: 40px 40px, 100%;
            border: 15px solid var(--primary);
            border-radius: 50px;
            box-shadow: 20px 20px 40px rgba(74,21,75,0.5), inset 0 0 80px rgba(181,55,242,0.12);
            position: relative;
            padding: 0 20px;
            animation: appear 0.8s ease-out;
            z-index: 10;
        }
        
        @media (max-width: 768px) {
            .journal-container {
                width: 98%;
                margin: 10px auto;
                border-width: 10px;
                padding: 0 10px;
                border-radius: 40px;
            }
        }
        
        /* Уголки дневника */
        .journal-corner {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 5px solid var(--accent);
            opacity: 0.3;
            z-index: 10;
        }
        
        @media (max-width: 768px) {
            .journal-corner {
                width: 40px;
                height: 40px;
                border-width: 4px;
            }
        }
        
        .corner-tl { top: -8px; left: -8px; border-right: none; border-bottom: none; }
        .corner-tr { top: -8px; right: -8px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: -8px; left: -8px; border-right: none; border-top: none; }
        .corner-br { bottom: -8px; right: -8px; border-left: none; border-top: none; }
        
        /* Билл Шифр */
        .bill-cipher {
            position: fixed;
            width: 100px;
            height: 100px;
            background: var(--cipher);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            opacity: 0.15;
            right: 20px;
            bottom: 20px;
            animation: spin 20s linear infinite, cyberpunkGlow 4s infinite;
            cursor: pointer;
            z-index: 10000;
            transition: all 0.3s;
        }
        
        @media (max-width: 768px) {
            .bill-cipher {
                width: 70px;
                height: 70px;
                right: 10px;
                bottom: 10px;
            }
        }
        
        .bill-cipher:hover {
            opacity: 1;
            animation: shake 0.5s infinite, spin 1s linear infinite;
            width: 120px;
            height: 120px;
        }
        
        .bill-cipher::before {
            content: "▲";
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--shadow);
            font-size: 2em;
            font-weight: bold;
        }
        
        .bill-cipher::after {
            content: "BILL";
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            color: var(--shadow);
            font-size: 0.7em;
            font-weight: bold;
        }
        
        /* ========== HEADER - исправленное позиционирование ========== */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(8px);
            border-radius: 0 0 40px 40px;
            margin-bottom: 20px;
            padding: 15px 0 5px 0;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .site-title {
            font-family: 'Rock Salt', cursive;
            font-size: 3.2em;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 3px 3px 0 var(--primary), 5px 5px 0 var(--secondary);
            letter-spacing: 3px;
            transform: rotate(-1deg);
            display: inline-block;
            padding: 0 20px;
            background: rgba(255,255,255,0.5);
            border-radius: 60px;
            margin-bottom: 8px;
            animation: float 5s ease-in-out infinite;
            border: 2px solid var(--secondary);
            word-break: break-word;
            max-width: 100%;
        }
        
        @media (max-width: 768px) {
            .site-title {
                font-size: 1.8em;
                padding: 8px 15px;
            }
        }
        
        /* ========== НАВИГАЦИЯ - компактная и без негатива ========== */
        .nav-bar {
            margin: 10px 15px 15px 15px;
            padding: 10px;
            background: var(--pine);
            border: 4px dashed var(--accent);
            border-radius: 60px;
            box-shadow: inset 0 0 20px rgba(0,204,255,0.3);
            width: auto;
        }
        
        @media (max-width: 768px) {
            .nav-bar {
                margin: 8px;
                padding: 8px;
            }
        }
        
        .nav-menu {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            list-style: none;
            width: 100%;
        }
        
        @media (max-width: 768px) {
            .nav-menu {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 8px;
            }
            .nav-item {
                flex: 0 0 auto;
            }
        }
        
        .nav-link {
            display: block;
            padding: 10px 22px;
            background: var(--journal);
            color: var(--primary);
            text-decoration: none;
            font-size: 1em;
            font-weight: bold;
            border: 3px solid var(--secondary);
            border-radius: 40px;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 3px 3px 0 var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        
        @media (max-width: 860px) {
            .nav-link {
                padding: 6px 14px;
                font-size: 0.85em;
                white-space: nowrap;
            }
        }
        
        @media (max-width: 680px) {
            .nav-link {
                padding: 8px 12px;
                font-size: 0.8em;
                white-space: normal;
                text-align: center;
            }
        }
        
        .nav-link:hover {
            transform: translateY(-3px) scale(1.05);
            background: var(--accent);
            color: var(--journal);
            box-shadow: 5px 5px 0 var(--primary);
            border-color: var(--primary);
        }
        
        .nav-link.active {
            background: var(--accent);
            color: var(--journal);
            border-color: var(--primary);
            box-shadow: inset 2px 2px 5px var(--shadow);
            transform: scale(0.98);
        }
        
        /* ========== КОНТЕНТ - убраны лишние отступы ========== */
        .content-section {
            padding: 25px 30px;
            margin: 20px 0;
            background: rgba(255,255,255,0.85);
            border: 4px dotted var(--primary);
            border-radius: 45px;
            backdrop-filter: blur(2px);
            animation: appear 0.6s ease-out;
            width: 100%;
            overflow-x: hidden;
            z-index: 20;
        }
        
        @media (max-width: 768px) {
            .content-section {
                padding: 18px 15px;
                margin: 15px 0;
            }
        }
        
        .section-title {
            font-family: 'Special Elite', cursive;
            font-size: 2.2em;
            color: var(--primary);
            text-shadow: 2px 2px 0 var(--accent);
            margin-bottom: 20px;
            border-bottom: 3px solid var(--secondary);
            padding-bottom: 8px;
            display: inline-block;
            position: relative;
            word-break: break-word;
        }
        
        @media (max-width: 768px) {
            .section-title {
                font-size: 1.6em;
            }
        }
        
        /* ========== ГАЛЕРЕЯ ========== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin: 25px 0;
        }
        
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
        
        .gallery-item {
            background: var(--journal);
            border: 4px solid var(--secondary);
            border-radius: 30px;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 8px 8px 0 var(--primary);
        }
        
        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 12px 12px 0 var(--accent);
            border-color: var(--primary);
        }
        
        /* about секция - улучшенная плотность */
        .about-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
        }
        
        @media (max-width: 900px) {
            .about-container {
                grid-template-columns: 1fr;
                gap: 25px;
            }
        }
        
        .about-image {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .photo-card {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .photo-box img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 28px;
            border: 4px solid var(--accent);
            box-shadow: 8px 8px 0 var(--primary);
            transition: all 0.3s;
        }
        
        .photo-box img:hover {
            transform: scale(1.02) rotate(2deg);
            box-shadow: 12px 12px 0 var(--secondary);
        }
        
        .about-skills h4, .testimonials h4 {
            margin: 20px 0 12px 0;
            color: var(--accent);
            font-size: 1.3em;
        }
        
        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .skill-tag {
            padding: 6px 14px;
            background: var(--journal);
            border: 2px solid var(--secondary);
            border-radius: 30px;
            color: var(--primary);
            font-weight: bold;
            font-size: 0.85em;
        }
        
        /* observational grid */
        .observational-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }
        
        .observation-card {
            background: var(--journal);
            padding: 20px;
            border-radius: 30px;
            border: 3px solid var(--primary);
            transition: all 0.3s;
        }
        
        .observation-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: 6px 6px 0 var(--accent);
        }
        
        /* timeline */
        .timeline {
            position: relative;
            padding: 30px 0;
            margin: 20px 0;
        }
        
        .timeline-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent);
            transform: translateX(-50%);
        }
        
        @media (max-width: 768px) {
            .timeline-line {
                left: 20px;
            }
        }
        
        .timeline-item {
            position: relative;
            width: 50%;
            padding: 15px 30px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .timeline-item {
                width: 100%;
                padding-left: 50px;
                padding-right: 15px;
            }
        }
        
        .timeline-left { left: 0; padding-right: 40px; }
        .timeline-right { left: 50%; padding-left: 40px; }
        
        @media (max-width: 768px) {
            .timeline-left, .timeline-right { left: 0; padding-left: 50px; padding-right: 15px; }
        }
        
        .timeline-content {
            background: var(--journal);
            padding: 18px;
            border-radius: 30px;
            border: 3px solid var(--primary);
            transition: all 0.2s;
        }
        
        .timeline-content:hover {
            transform: scale(1.01);
            border-color: var(--accent);
        }
        
        /* backgrounds grid */
        .backgrounds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }
        
        /* masonry grid */
        .masonry-grid {
            column-count: 4;
            column-gap: 20px;
        }
        
        @media (max-width: 1024px) { .masonry-grid { column-count: 3; } }
        @media (max-width: 768px) { .masonry-grid { column-count: 2; } }
        @media (max-width: 480px) { .masonry-grid { column-count: 1; } }
        
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 20px;
            background: var(--journal);
            border-radius: 28px;
            overflow: hidden;
            border: 3px solid var(--secondary);
            transition: all 0.2s;
        }
        
        .masonry-item:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
        }
        
        /* footer - компактный */
        .site-footer {
            background: var(--pine);
            text-align: center;
            padding: 30px 20px;
            margin-top: 40px;
            border-top: 8px solid var(--secondary);
            border-radius: 0 0 35px 35px;
        }
        
        .footer-email {
            font-size: 1.5em;
            color: var(--accent);
            text-decoration: none;
            border: 3px dashed var(--accent);
            padding: 10px 25px;
            border-radius: 50px;
            display: inline-block;
            margin: 15px 0;
            transition: all 0.3s;
        }
        
        @media (max-width: 768px) {
            .footer-email { font-size: 1.1em; padding: 8px 18px; }
        }
        
        .counter {
            display: inline-block;
            background: var(--shadow);
            color: var(--cipher);
            padding: 8px 20px;
            border-radius: 15px;
            font-family: monospace;
            font-size: 1.1em;
            margin-top: 15px;
        }
        
        /* modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 10001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(74,21,75,0.95);
            overflow-y: auto;
            padding: 20px;
        }
        
        .modal-content {
            background: var(--journal);
            margin: 40px auto;
            padding: 25px;
            border: 12px solid var(--secondary);
            border-radius: 50px;
            max-width: 500px;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 2em;
            cursor: pointer;
            color: var(--primary);
        }
        
        /* карта секретов */
        .map-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        
        @media (max-width: 768px) {
            .map-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
        }
        
        .map-cell {
            aspect-ratio: 1;
            background: rgba(255,217,102,0.6);
            border: 2px solid var(--accent);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        
        .map-cell.revealed {
            background: var(--cipher);
            color: var(--shadow);
        }
        
        .filter-btn {
            padding: 8px 18px;
            background: var(--journal);
            border: 2px solid var(--primary);
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn.active, .filter-btn:hover {
            background: var(--primary);
            color: var(--journal);
            border-color: var(--accent);
        }
        
        .personal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .personal-card {
            background: var(--journal);
            padding: 20px;
            border-radius: 30px;
            border: 3px solid var(--secondary);
            transition: all 0.2s;
        }
        
        .personal-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
        }
        
        .about-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        
        .stat-item {
            text-align: center;
            background: var(--journal);
            padding: 12px;
            border-radius: 20px;
            border: 2px solid var(--secondary);
        }
        
        /* общие улучшения */
        .intro-big {
            font-size: 1.6em;
            color: var(--accent);
            margin-bottom: 12px;
        }
        
        .stats-mini {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        
        .stat-mini-item {
            background: rgba(255,107,157,0.2);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid var(--accent);
        }
    </style>
</head>

    <div class="star" style="top: 20%; right: 15%; animation-duration: 16s;">💫</div>

    <div class="bill-cipher" title="Билл Шифр" onclick="billClick()"></div>
    
    <div class="journal-container">
        <div class="journal-corner corner-tl"></div>
        <div class="journal-corner corner-tr"></div>
        <div class="journal-corner corner-bl"></div>
        <div class="journal-corner corner-br"></div>
        
        <header class="site-header">
            <div style="text-align: center;">
                <h1 class="site-title">🔮 Edasartistry 🔮</h1>
            </div>
            <nav class="nav-bar">
                <ul class="nav-menu" id="navMenu"></ul>
            </nav>
        </header>
        
        <main id="mainContent"></main>
        
        <footer class="site-footer">
            <div class="footer-text">📬 СВЯЗАТЬСЯ С ХИЖИНОЙ ТАЙН:</div>

            <div class="cipher-footer">⬟⬟⬟ ◆◆◆</div>

            <div class="counter">⏳ СТРАННЫХ СОБЫТИЙ: <span id="randomCounter">4231</span></div>
        </footer>
    </div>
    
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-body">
                <div class="modal-emoji" id="modalEmoji" style="font-size:4em; text-align:center;"></div>
                <h2 id="modalTitle" style="text-align:center;"></h2>
                <p id="modalDesc" style="margin:15px 0;"></p>
                <p class="modal-story" id="modalStory" style="background:#f0f0f0; padding:12px; border-radius:20px;"></p>
                <div class="modal-year" id="modalYear" style="text-align:center;"></div>
            </div>
        </div>
    </div>
    
    <script>
        // данные (сокращены для читаемости, но полные из исходника)
        const galleryItems = [
            {title:'Тайна леса', category:'landscapes', year:'2023', desc:'Серия работ о существах из Гравити Фолз', img:'🌲', story:'Странные огни в лесу'},
            {title:'Хижина Тайн', category:'landscapes', year:'2023', desc:'Интерьеры загадочного места', img:'🏚️', story:'Детали из реальных фото'},
            {title:'Билл Шифр', category:'characters', year:'2024', desc:'Портреты всеведущего демона', img:'🔺', story:'Билл появлялся в снах'},
            {title:'Близнецы', category:'characters', year:'2023', desc:'Диппер и Мэйбл', img:'👥', story:'12 портретов в разных стилях'},
            {title:'Пухля', category:'characters', year:'2024', desc:'Король свиней', img:'🐷', story:'Пухля позировал лично'},
            {title:'Зус', category:'characters', year:'2023', desc:'Комиксы о Зусе', img:'👨', story:'Комикс из 24 страниц'},
            {title:'Венди', category:'characters', year:'2024', desc:'Скейт-культура', img:'🛹', story:'Вдохновлено скейтерами Орегона'},
            {title:'Дядя Стэн', category:'characters', year:'2023', desc:'Портреты и карикатуры', img:'👴', story:'Серия шаржей'},
            {title:'Гидеон', category:'characters', year:'2023', desc:'Маленький злодей', img:'🎩', story:'Главный антагонист'},
            {title:'Лес осенью', category:'landscapes', year:'2024', desc:'Золотая осень', img:'🍂', story:'Пленэр в парке'}
        ];
        
        const observations = [
            {title:'Лесные гномы', desc:'Сбор ягод и танцы под луной', time:'14:30', icon:'👺', loc:'Старый пень'},
            {title:'Билл Шифр', desc:'Мелькает в зеркалах', time:'03:15', icon:'🔺', loc:'Везде'},
            {title:'Пухля', desc:'Ест каждые 2 часа', time:'12:00', icon:'🐷', loc:'Загон'},
            {title:'Хижина', desc:'Странные звуки ночью', time:'02:00', icon:'🏚️', loc:'Подвал'}
        ];
        
        const timelineData = [
            {year:'Лето 2012', title:'ПРИБЫТИЕ', desc:'Первые наброски', icon:'🚌', details:'47 первых набросков'},
            {year:'2014', title:'ПУТЕШЕСТВИЯ', desc:'Поиск новых тайн', icon:'🗺️', details:'5000 км'},
            {year:'2018', title:'АНИМАЦИЯ', desc:'Оживил персонажей', icon:'🎬', details:'3 фильма'},
            {year:'2022', title:'10 ЛЕТ', desc:'Юбилей', icon:'🎉', details:'100 гостей'}
        ];
        
        const bgItems = [
            {name:'Хижина Тайн', time:'День', desc:'Главное здание', icon:'🏚️', danger:'Безопасно', secret:'🔼'},
            {name:'Лесная опушка', time:'Закат', desc:'Место гномов', icon:'🌅', danger:'Опасно', secret:'🌲'}
        ];
        
        const pages = { about: 'О себе', portfolio: 'Портфолио', observational: 'Наблюдения', story: 'История', backgrounds: 'Фоны', illustrations: 'Иллюстрации' };
        let currentPage = new URLSearchParams(window.location.search).get('page') || 'about';
        let secretCount = 3;
        
        function renderNav() {
            const nav = document.getElementById('navMenu');
            nav.innerHTML = Object.entries(pages).map(([key, title]) => 
                `<li class="nav-item"><a href="?page=${key}" class="nav-link ${currentPage === key ? 'active' : ''}">${title}</a></li>`
            ).join('');
        }
        
        function openModal(item) {
            document.getElementById('modalEmoji').innerHTML = item.img;
            document.getElementById('modalTitle').innerHTML = item.title;
            document.getElementById('modalDesc').innerHTML = item.desc;
            document.getElementById('modalStory').innerHTML = '📖 ' + (item.story || 'Тайная история');
            document.getElementById('modalYear').innerHTML = 'Год: ' + item.year;
            document.getElementById('imageModal').style.display = 'block';
        }
        
        function closeModal() { document.getElementById('imageModal').style.display = 'none'; }
        function billClick() { alert('🔺 БИЛЛ ШИФР: "РЕАЛЬНОСТЬ - ИЛЛЮЗИЯ!"'); }
        function revealSecret(cell, num, msg) {
            if(!cell.classList.contains('revealed')) {
                cell.classList.add('revealed');
                cell.innerHTML = '🔍';
                secretCount++;
                const cntSpan = document.getElementById('secretCount');
                if(cntSpan) cntSpan.innerText = secretCount;
                alert('🎉 СЕКРЕТ: ' + msg);
            }
        }
        
        function renderContent() {
            let html = '';
            if(currentPage === 'about') {
                html = `<div class="content-section"><div class="about-container"><div class="about-image"><div class="photo-card"><div class="photo-box"><img src="./img/й.jpg" alt="photo" onerror="this.src='https://via.placeholder.com/200?text=Eda'"></div><div class="photo-title">Edasartistry</div></div></div><div class="about-content"><p class="about-greeting">🔆 ДОБРО ПОЖАЛОВАТЬ В ХИЖИНУ ТАЙН! 🔆</p><p>Меня зовут Edasartistry, художник и искатель приключений, 12 лет живущий в Гравити Фолз.</p><div class="about-stats"><div class="stat-item"><div class="stat-number">1500+</div><div class="stat-label">работ</div></div><div class="stat-item"><div class="stat-number">12</div><div class="stat-label">лет</div></div><div class="stat-item"><div class="stat-number">247</div><div class="stat-label">наблюдений</div></div></div><div class="about-skills"><h4>🔧 ИНСТРУМЕНТЫ</h4><div class="skills-list"><span class="skill-tag">✏️ Рисунок</span><span class="skill-tag">💻 Цифра</span><span class="skill-tag">🎨 Акварель</span><span class="skill-tag">🎬 Анимация</span></div></div></div></div></div>`;
            }
            else if(currentPage === 'portfolio') {
                html = `<div class="content-section"><h2 class="section-title">🎨 PORTFOLIO</h2><div class="gallery-filter"><button class="filter-btn active" data-filter="all">Все</button><button class="filter-btn" data-filter="characters">Персонажи</button><button class="filter-btn" data-filter="landscapes">Пейзажи</button></div><div class="gallery-grid" id="galleryGrid"></div><div class="personal-works"><h3>✨ PERSONAL WORK</h3><div class="personal-grid"><div class="personal-card"><h4>Эксперименты</h4><p>Текстуры старой бумаги</p></div><div class="personal-card"><h4>Аниматик</h4><p>Короткие сцены</p></div></div></div></div>`;
                setTimeout(() => {
                    const grid = document.getElementById('galleryGrid');
                    if(grid) grid.innerHTML = galleryItems.map(item => `<div class="gallery-item" data-category="${item.category}"><div class="gallery-image" style="background:linear-gradient(135deg,var(--primary),var(--mystery));padding:30px;text-align:center;cursor:pointer;" onclick='openModal(${JSON.stringify(item).replace(/'/g, "&apos;")})'><div class="gallery-emoji" style="font-size:4em;">${item.img}</div><div class="gallery-year">${item.year}</div></div><div class="gallery-info"><h3>${item.title}</h3><p>${item.desc}</p></div></div>`).join('');
                }, 10);
            }
            else if(currentPage === 'observational') {
                html = `<div class="content-section"><h2 class="section-title">🔍 НАБЛЮДЕНИЯ</h2><div class="observational-grid" id="obsGrid"></div><div class="daily-cipher" style="margin-top:20px;padding:20px;background:var(--mystery);border-radius:30px;"><div>🔐 КРИПТОГРАММА: ⬟◆⬟◆ ⬟⬟◆⬟</div><div class="cipher-answer" onclick="this.innerHTML='БИЛЛ ШИФР СМОТРИТ'">Показать ответ</div></div></div>`;
                setTimeout(() => {
                    const grid = document.getElementById('obsGrid');
                    if(grid) grid.innerHTML = observations.map(obs => `<div class="observation-card"><div class="observation-time">⏰ ${obs.time}</div><div class="observation-icon" style="font-size:2.5em;">${obs.icon}</div><h4>${obs.title}</h4><p>${obs.desc}</p><div class="observation-location">📍 ${obs.loc}</div></div>`).join('');
                }, 10);
            }
            else if(currentPage === 'story') {
                html = `<div class="content-section"><h2 class="section-title">📚 ИСТОРИЯ</h2><div class="timeline" id="timelineContainer"></div><div class="journal-page" style="margin-top:30px;padding:25px;background:var(--journal);border-radius:40px;"><p class="journal-page-title">САМАЯ ВАЖНАЯ ЗАПИСЬ</p><p>Каждая история заслуживает быть рассказанной. Мои рисунки сохраняют тайны.</p><div class="invisible-text" style="margin-top:15px;text-align:center;cursor:pointer;" onclick="this.innerHTML='👁️ БИЛЛ ЗДЕСЬ'">Найди секрет</div></div></div>`;
                setTimeout(() => {
                    const container = document.getElementById('timelineContainer');
                    if(container) container.innerHTML = `<div class="timeline-line"></div>` + timelineData.map((t,i) => `<div class="timeline-item ${i%2===0?'timeline-left':'timeline-right'}"><div class="timeline-content"><div class="timeline-icon" style="display:inline-block;margin-bottom:8px;">${t.icon}</div><div class="timeline-year">${t.year}</div><h3>${t.title}</h3><p>${t.desc}</p><div class="timeline-details">${t.details}</div></div></div>`).join('');
                }, 10);
            }
            else if(currentPage === 'backgrounds') {
                html = `<div class="content-section"><h2 class="section-title">🌲 ФОНЫ</h2><div class="backgrounds-grid" id="bgGrid"></div><div class="mystery-map"><h3>🗺️ КАРТА ТАЙН</h3><p>Найдено: <span id="secretCount">3</span>/8</p><div class="map-grid" id="mapGrid"></div></div></div>`;
                setTimeout(() => {
                    const bgGrid = document.getElementById('bgGrid');
                    if(bgGrid) bgGrid.innerHTML = bgItems.map(b => `<div class="background-card"><div class="background-image" style="background:var(--sky);padding:40px;text-align:center;"><span style="font-size:3em;">${b.icon}</span><div>${b.time}</div></div><h3>${b.name}</h3><p>${b.desc}</p></div>`).join('');
                    const mapGrid = document.getElementById('mapGrid');
                    if(mapGrid) {
                        let mapHtml = '';
                        for(let i=1;i<=8;i++) mapHtml += `<div class="map-cell" onclick="revealSecret(this,${i},'Секрет #${i}')">?</div>`;
                        mapGrid.innerHTML = mapHtml;
                    }
                }, 10);
            }
            else if(currentPage === 'illustrations') {
                html = `<div class="content-section"><h2 class="section-title">✏️ ИЛЛЮСТРАЦИИ</h2><div class="masonry-grid" id="masonryGrid"></div></div>`;
                setTimeout(() => {
                    const grid = document.getElementById('masonryGrid');
                    if(grid) {
                        let illus = '';
                        for(let i=1;i<=24;i++) illus += `<div class="masonry-item"><div class="masonry-image" style="background:var(--pine);padding:30px;text-align:center;"><div class="masonry-emoji" style="font-size:3em;">🎨</div><div class="masonry-year">2023</div></div><div class="masonry-info"><h4>Иллюстрация #${i}</h4></div></div>`;
                        grid.innerHTML = illus;
                    }
                }, 10);
            }
            document.getElementById('mainContent').innerHTML = html;
        }
        
        window.addEventListener('load', () => {
            renderNav();
            renderContent();
            document.getElementById('randomCounter').innerText = Math.floor(3000 + Math.random() * 7000);
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    const href = link.getAttribute('href');
                    if(href && href.includes('?page=')) {
                        e.preventDefault();
                        currentPage = href.split('?page=')[1];
                        history.pushState({}, '', href);
                        renderNav();
                        renderContent();
                    }
                });
            });
        });
        window.onclick = (e) => { if(e.target === document.getElementById('imageModal')) closeModal(); };
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.billClick = billClick;
        window.revealSecret = revealSecret;
    </script>
</body>
</html>
