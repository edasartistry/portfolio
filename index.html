<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CHANEL MAYOR - Gravity Falls Portal</title>
    <style>
        /* ========== RESET ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* ========== FONTS ========== */
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Patrick+Hand&family=Rock+Salt&display=swap');
        
        :root {
            --primary: #ff6b9d;
            --secondary: #00ccff;
            --accent: #b537f2;
            --pine: #ffd966;
            --sky: #ff99c8;
            --mystery: #a0e7e5;
            --journal: #ffffff;
            --wood: #ffb347;
            --shadow: #4a154b;
            --cipher: #39ff14;
        }
        
        body {
            font-family: 'Patrick Hand', 'Courier New', cursive;
            background-color: var(--shadow);
            background-image: 
                repeating-linear-gradient(45deg,
                    rgba(255,107,157,0.12) 0px,
                    rgba(255,107,157,0.12) 20px,
                    rgba(0,204,255,0.12) 20px,
                    rgba(0,204,255,0.12) 40px
                );
            background-size: 80px 80px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            width: 100%;
        }
        
        /* Эффект старой плёнки */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg,
                rgba(255,105,180,0.05) 0px,
                rgba(255,105,180,0.05) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 9999;
        }
        
        /* ========== ЗВЕЗДОЧКИ ========== */
        .star {
            position: fixed;
            font-size: 24px;
            user-select: none;
            pointer-events: none;
            z-index: 5;
            opacity: 0.6;
            color: var(--cipher);
            text-shadow: 0 0 10px var(--accent);
            filter: drop-shadow(0 0 5px var(--secondary));
            will-change: transform;
            animation: floatStar linear infinite;
        }
        
        @keyframes floatStar {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -20px) rotate(15deg); }
            50% { transform: translate(60px, 0) rotate(30deg); }
            75% { transform: translate(30px, 20px) rotate(15deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        
        /* ========== АНИМАЦИИ ========== */
        @keyframes float { 0% { transform: translateY(0px) rotate(-2deg); } 50% { transform: translateY(-15px) rotate(-2deg); } 100% { transform: translateY(0px) rotate(-2deg); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes flicker { 0% { opacity: 1; } 25% { opacity: 0.7; } 50% { opacity: 1; } 75% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); } 90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        @keyframes glow { 0% { text-shadow: 0 0 5px var(--accent); } 50% { text-shadow: 0 0 30px var(--accent), 0 0 50px var(--primary); } 100% { text-shadow: 0 0 5px var(--accent); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        @keyframes appear { from { opacity: 0; transform: translateY(30px) rotate(-2deg); } to { opacity: 1; transform: translateY(0) rotate(0deg); } }
        @keyframes cyberpunkGlow { 0% { filter: drop-shadow(0 0 5px var(--secondary)); } 50% { filter: drop-shadow(0 0 20px var(--accent)); } 100% { filter: drop-shadow(0 0 5px var(--secondary)); } }
        @keyframes kawaiiBounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        /* ========== MAIN CONTAINER ========== */
        .journal-container {
            max-width: 1400px;
            width: 95%;
            margin: 20px auto;
            background: var(--journal);
            background-image: radial-gradient(circle at 20px 20px, rgba(255,217,102,0.25) 2px, transparent 2px), linear-gradient(var(--journal), rgba(255,153,200,0.12));
            background-size: 40px 40px, 100%;
            border: 15px solid var(--primary);
            border-radius: 50px;
            box-shadow: 20px 20px 40px rgba(74,21,75,0.5), inset 0 0 80px rgba(181,55,242,0.12);
            position: relative;
            padding: 0 20px;
            animation: appear 0.8s ease-out;
            z-index: 10;
        }
        @media (max-width: 768px) { .journal-container { width: 98%; margin: 10px auto; border-width: 10px; padding: 0 10px; border-radius: 40px; } }
        
        .journal-corner { position: absolute; width: 60px; height: 60px; border: 5px solid var(--accent); opacity: 0.3; z-index: 10; }
        .corner-tl { top: -8px; left: -8px; border-right: none; border-bottom: none; }
        .corner-tr { top: -8px; right: -8px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: -8px; left: -8px; border-right: none; border-top: none; }
        .corner-br { bottom: -8px; right: -8px; border-left: none; border-top: none; }
        @media (max-width: 768px) { .journal-corner { width: 40px; height: 40px; border-width: 4px; } }
        
        .bill-cipher {
            position: fixed;
            width: 100px;
            height: 100px;
            background: var(--cipher);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            opacity: 0.15;
            right: 20px;
            bottom: 20px;
            animation: spin 20s linear infinite, cyberpunkGlow 4s infinite;
            cursor: pointer;
            z-index: 10000;
            transition: all 0.3s;
        }
        @media (max-width: 768px) { .bill-cipher { width: 70px; height: 70px; right: 10px; bottom: 10px; } }
        .bill-cipher:hover { opacity: 1; animation: shake 0.5s infinite, spin 1s linear infinite; width: 120px; height: 120px; }
        .bill-cipher::before { content: "▲"; position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); color: var(--shadow); font-size: 2em; font-weight: bold; }
        .bill-cipher::after { content: "BILL"; position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); color: var(--shadow); font-size: 0.7em; font-weight: bold; }
        
        /* ========== HEADER ========== */
        .site-header { text-align: center; padding: 30px 10px; position: relative; }
        .site-title {
            font-family: 'Rock Salt', cursive; font-size: 4em; font-weight: bold; color: var(--accent);
            text-shadow: 4px 4px 0 var(--primary), 7px 7px 0 var(--secondary), 10px 10px 10px var(--shadow);
            letter-spacing: 5px; transform: rotate(-2deg); display: inline-block; padding: 0 30px;
            background: rgba(255,255,255,0.2); border-radius: 60px; margin-bottom: 20px; animation: float 5s ease-in-out infinite, cyberpunkGlow 3s infinite;
            border: 3px solid var(--secondary); word-break: break-word; max-width: 100%;
        }
        @media (max-width: 1024px) { .site-title { font-size: 3em; } }
        @media (max-width: 768px) { .site-title { font-size: 2.2em; padding: 10px 20px; } }
        .site-title::before, .site-title::after { content: "★"; position: absolute; top: 50%; transform: translateY(-50%); font-size: 1.5em; color: var(--cipher); text-shadow: 2px 2px 0 var(--secondary); animation: spin 6s linear infinite; }
        .site-title::before { left: -15px; } .site-title::after { right: -15px; }
        
        /* ========== НАВИГАЦИЯ ========== */
        .nav-bar { margin: 15px 0 20px; padding: 20px; background: var(--pine); border: 6px dashed var(--accent); border-radius: 60px; box-shadow: inset 0 0 30px rgba(0,204,255,0.5); animation: pulse 4s infinite; width: 100%; overflow: hidden; }
        .nav-menu { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; list-style: none; width: 100%; }
        @media (max-width: 768px) { .nav-menu { flex-direction: column; gap: 10px; } .nav-item { width: 100%; } }
        .nav-link {
            display: block; padding: 12px 20px; background: var(--journal); color: var(--primary); text-decoration: none;
            font-size: 1.1em; font-weight: bold; border: 4px solid var(--secondary); border-radius: 40px; transform: rotate(var(--rot, 0deg));
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 5px 5px 0 var(--secondary); text-transform: uppercase;
            letter-spacing: 2px; position: relative; overflow: hidden; white-space: nowrap;
        }
        @media (max-width: 768px) { .nav-link { white-space: normal; text-align: center; width: 100%; transform: rotate(0deg) !important; } }
        .nav-link:hover { transform: rotate(0deg) scale(1.1); background: var(--accent); color: var(--journal); box-shadow: 8px 8px 0 var(--primary); border-color: var(--primary); }
        .nav-link.active { background: var(--accent); color: var(--journal); border-color: var(--primary); box-shadow: inset 3px 3px 8px var(--shadow); transform: rotate(0deg) scale(1.05); }
        
        /* ========== КОНТЕНТ ========== */
        .content-section { padding: 30px; margin: 30px 0; background: rgba(255,255,255,0.8); border: 5px dotted var(--primary); border-radius: 50px; backdrop-filter: blur(3px); animation: appear 0.6s ease-out; width: 100%; overflow-x: hidden; z-index: 20; }
        @media (max-width: 768px) { .content-section { padding: 20px 15px; } }
        .section-title { font-family: 'Special Elite', cursive; font-size: 2.5em; color: var(--primary); text-shadow: 2px 2px 0 var(--accent); margin-bottom: 30px; border-bottom: 4px solid var(--secondary); padding-bottom: 12px; display: inline-block; position: relative; word-break: break-word; }
        .section-title::after { content: "⬟"; position: absolute; right: -30px; top: 0; font-size: 1.2em; color: var(--cipher); opacity: 0.5; }
        
        /* ========== ГАЛЕРЕЯ ========== */
        .gallery-filter, .illustrations-filter { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0 30px; justify-content: center; width: 100%; }
        .filter-btn { padding: 12px 20px; background: var(--journal); border: 3px solid var(--primary); border-radius: 40px; color: var(--primary); font-weight: bold; font-size: 1em; cursor: pointer; transition: all 0.3s; }
        @media (max-width: 768px) { .filter-btn { padding: 10px 15px; min-width: calc(50% - 10px); } }
        .filter-btn:hover, .filter-btn.active { background: var(--primary); color: var(--journal); border-color: var(--accent); transform: scale(1.05); }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin: 30px 0; }
        .gallery-item { background: var(--journal); border: 5px solid var(--secondary); border-radius: 35px; overflow: hidden; transform: rotate(var(--rot, -1deg)); transition: all 0.4s; box-shadow: 10px 10px 0 var(--primary); animation: appear 0.5s ease-out; }
        .gallery-item:nth-child(even) { --rot: 2deg; }
        .gallery-item:hover { transform: rotate(0deg) scale(1.02); box-shadow: 15px 15px 0 var(--accent); border-color: var(--primary); }
        .gallery-image { height: 200px; background: var(--pine); position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(circle at 30% 30%, var(--accent) 10px, transparent 10px), linear-gradient(45deg, var(--primary) 0%, var(--mystery) 100%); }
        .gallery-emoji { font-size: 4em; z-index: 2; transition: all 0.3s; }
        .gallery-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(74,21,75,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; z-index: 3; }
        .gallery-image:hover .gallery-overlay { opacity: 1; }
        .gallery-year { position: absolute; top: 12px; right: 12px; background: var(--secondary); color: white; padding: 4px 12px; border-radius: 25px; font-weight: bold; }
        .gallery-info { padding: 15px; }
        
        /* ========== МОДАЛЬНОЕ ОКНО ========== */
        .modal { display: none; position: fixed; z-index: 10001; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(74,21,75,0.94); animation: flicker 0.3s; overflow-y: auto; padding: 20px; }
        .modal-content { background: var(--journal); margin: 20px auto; padding: 30px; border: 15px solid var(--secondary); border-radius: 60px; width: 90%; max-width: 600px; position: relative; animation: appear 0.4s; box-shadow: 25px 25px 50px var(--shadow); text-align: center; }
        .modal-close { position: absolute; right: 20px; top: 15px; font-size: 2.5em; cursor: pointer; color: var(--primary); }
        .modal-emoji { font-size: 6em; margin: 20px 0; animation: spin 6s linear infinite; }
        .modal-story { font-style: italic; background: rgba(181,55,242,0.1); padding: 15px; border-radius: 20px; margin: 15px 0; }
        
        /* ========== ABOUT ========== */
        .about-container { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        @media (max-width: 1024px) { .about-container { grid-template-columns: 1fr; } }
        .polaroid { background: var(--journal); padding: 15px 15px 30px; border: 5px solid var(--secondary); transform: rotate(-3deg); box-shadow: 15px 15px 0 var(--primary); transition: all 0.4s; cursor: pointer; max-width: 300px; margin: 0 auto; }
        .polaroid-image { height: 280px; background: var(--pine); display: flex; align-items: center; justify-content: center; font-size: 5em; background-image: radial-gradient(circle at 30% 30%, var(--accent) 15px, transparent 15px), linear-gradient(45deg, var(--primary) 0%, var(--mystery) 100%); border-radius: 5px; overflow: hidden; }
        .polaroid-image img { width: 100%; height: 100%; object-fit: cover; }
        .badge-logo { width: 80px; height: 80px; margin: 10px auto; border-radius: 50%; overflow: hidden; border: 3px solid #fff; }
        .badge-logo img { width: 100%; height: 100%; object-fit: cover; }
        .social-links { display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto; width: 100%; }
        .social-link { padding: 12px; background: var(--journal); border: 3px solid var(--secondary); border-radius: 40px; color: var(--primary); text-decoration: none; text-align: center; transition: all 0.3s; font-weight: bold; }
        .about-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 30px 0; }
        .stat-item { text-align: center; background: var(--journal); padding: 15px; border-radius: 25px; border: 3px solid var(--secondary); }
        .stat-number { font-size: 1.8em; font-weight: bold; color: var(--accent); }
        .skills-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .skill-tag { padding: 8px 15px; background: var(--journal); border: 2px solid var(--secondary); border-radius: 30px; color: var(--primary); font-weight: bold; }
        .testimonial-item { background: rgba(255,217,102,0.2); padding: 15px; border-radius: 20px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        
        /* ========== OBSERVATIONAL ========== */
        .observational-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin: 30px 0; }
        .observation-card { background: var(--journal); padding: 25px 20px; border-radius: 35px; border: 4px solid var(--primary); position: relative; transition: all 0.4s; cursor: pointer; }
        .observation-time { position: absolute; top: -12px; left: 15px; background: var(--secondary); color: white; padding: 5px 15px; border-radius: 30px; }
        .observation-icon { font-size: 3.5em; text-align: center; margin: 15px 0; }
        .daily-cipher, .cipher-box { margin-top: 30px; padding: 20px; background: var(--mystery); border-radius: 30px; text-align: center; color: var(--shadow); }
        .cipher-code, .cipher-display { font-family: monospace; font-size: 1.8em; letter-spacing: 8px; margin: 15px 0; word-break: break-word; }
        .cipher-answer { display: inline-block; padding: 8px 20px; background: var(--accent); color: var(--journal); border-radius: 30px; cursor: pointer; }
        
        /* ========== TIMELINE ========== */
        .timeline { position: relative; padding: 40px 0; margin: 30px 0; }
        .timeline-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 6px; background: var(--accent); transform: translateX(-50%); box-shadow: 0 0 20px var(--cipher); z-index: 1; }
        @media (max-width: 768px) { .timeline-line { left: 20px; } }
        .timeline-item { position: relative; width: 50%; padding: 20px 40px; animation: appear 0.5s ease-out forwards; opacity: 0; z-index: 2; }
        @media (max-width: 768px) { .timeline-item { width: 100%; left: 0; padding: 15px 20px 15px 50px; } }
        .timeline-left { left: 0; padding-right: 50px; }
        .timeline-right { left: 50%; padding-left: 50px; }
        .timeline-content { background: var(--journal); padding: 25px; border-radius: 40px; border: 4px solid var(--primary); box-shadow: 10px 10px 0 var(--secondary); transition: all 0.3s; }
        .timeline-icon { position: absolute; top: -20px; left: 20px; background: var(--accent); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5em; border: 3px solid var(--primary); animation: spin 8s linear infinite; }
        .timeline-year { display: inline-block; background: var(--primary); color: var(--journal); padding: 5px 20px; border-radius: 30px; margin-bottom: 10px; }
        .timeline-dot { position: absolute; width: 25px; height: 25px; background: var(--cipher); border: 4px solid var(--primary); border-radius: 50%; top: 50%; transform: translateY(-50%); animation: pulse 2s infinite; }
        .timeline-left .timeline-dot { right: -42.5px; }
        .timeline-right .timeline-dot { left: -42.5px; }
        @media (max-width: 768px) { .timeline-left .timeline-dot, .timeline-right .timeline-dot { left: -32px; } }
        .journal-page { margin-top: 40px; padding: 40px; background: var(--journal); border-radius: 50px; transform: rotate(0.3deg); border: 5px double var(--secondary); position: relative; }
        .invisible-text { color: transparent; text-shadow: 0 0 6px var(--cipher); cursor: help; text-align: center; margin-top: 20px; padding: 10px; background: rgba(255,217,102,0.2); border-radius: 20px; }
        .invisible-text:hover { color: var(--accent); text-shadow: none; }
        
        /* ========== BACKGROUNDS ========== */
        .backgrounds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .background-card { background: var(--journal); border-radius: 45px; overflow: hidden; border: 4px solid var(--secondary); transition: all 0.4s; cursor: pointer; }
        .background-image { height: 200px; position: relative; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--sky), var(--pine)); }
        .background-icon { font-size: 4em; z-index: 2; }
        .background-time, .background-danger { position: absolute; background: rgba(0,0,0,0.7); color: white; padding: 5px 12px; border-radius: 30px; font-size: 0.8em; }
        .background-time { top: 10px; left: 10px; }
        .background-danger { bottom: 10px; left: 10px; background: rgba(255,0,0,0.7); }
        .background-secret { position: absolute; bottom: 10px; right: 10px; background: var(--accent); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: all 0.3s; }
        .background-card:hover .background-secret { opacity: 1; transform: rotate(360deg); }
        .mystery-map { margin-top: 50px; padding: 30px; background: var(--mystery); border-radius: 50px; }
        .map-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin: 20px 0; }
        @media (max-width: 768px) { .map-grid { grid-template-columns: repeat(4, 1fr); } }
        .map-cell { aspect-ratio: 1; background: rgba(255,217,102,0.5); border: 2px solid var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.5em; transition: all 0.3s; position: relative; }
        .map-cell.revealed { background: var(--cipher); color: var(--shadow); }
        .map-tooltip { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--secondary); color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.8em; white-space: nowrap; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .map-cell:hover .map-tooltip { opacity: 1; }
        
        /* ========== ILLUSTRATIONS (MASONRY) ========== */
        .masonry-grid { column-count: 4; column-gap: 20px; }
        @media (max-width: 1024px) { .masonry-grid { column-count: 3; } }
        @media (max-width: 768px) { .masonry-grid { column-count: 2; } }
        @media (max-width: 480px) { .masonry-grid { column-count: 1; } }
        .masonry-item { break-inside: avoid; margin-bottom: 20px; background: var(--journal); border-radius: 35px; overflow: hidden; border: 4px solid var(--secondary); transition: all 0.4s; cursor: pointer; }
        .masonry-image { position: relative; height: 180px; background: linear-gradient(135deg, var(--primary), var(--mystery)); display: flex; align-items: center; justify-content: center; }
        .masonry-item.portrait .masonry-image { height: 280px; }
        .masonry-emoji { font-size: 3.5em; }
        .masonry-year { position: absolute; top: 10px; left: 10px; background: var(--secondary); color: white; padding: 4px 12px; border-radius: 25px; }
        .personal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin: 30px 0; }
        .personal-card { background: var(--journal); padding: 25px; border-radius: 40px; border: 4px solid var(--secondary); position: relative; cursor: pointer; transition: all 0.4s; }
        .personal-number { font-size: 3em; font-weight: bold; color: rgba(181,55,242,0.2); position: absolute; bottom: 10px; right: 15px; }
        
        /* ========== FOOTER ========== */
        .site-footer { background: var(--pine); text-align: center; padding: 40px 20px; margin-top: 50px; border-top: 12px solid var(--secondary); border-radius: 0 0 40px 40px; }
        .footer-email { font-size: 2.2em; color: var(--accent); text-decoration: none; border: 4px dashed var(--accent); padding: 15px 30px; border-radius: 60px; display: inline-block; margin: 20px 0; transition: all 0.4s; animation: cyberpunkGlow 2s infinite; word-break: break-word; }
        @media (max-width: 768px) { .footer-email { font-size: 1.3em; } }
        .counter { display: inline-block; background: var(--shadow); color: var(--cipher); padding: 12px 25px; border-radius: 15px; font-family: monospace; margin-top: 20px; border: 3px solid var(--accent); }
        .easter-egg { margin-top: 30px; text-align: center; padding: 20px; background: rgba(255,107,157,0.2); border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="star" style="top: 3%; left: 2%; animation-duration: 14s;">⭐</div><div class="star" style="top: 7%; right: 5%; animation-duration: 18s;">✨</div><div class="star" style="top: 12%; left: 10%; animation-duration: 22s;">🌟</div>
    <div class="bill-cipher" title="Билл Шифр" onclick="billClick()"></div>
    <div class="journal-container">
        <div class="journal-corner corner-tl"></div><div class="journal-corner corner-tr"></div><div class="journal-corner corner-bl"></div><div class="journal-corner corner-br"></div>
        <header class="site-header">
            <h1 class="site-title">CHANEL MAYOR</h1>
            <nav class="nav-bar"><ul class="nav-menu" id="navMenu"></ul></nav>
        </header>
        <main id="mainContent"></main>
        <footer class="site-footer">
            <div class="footer-text">📬 СВЯЗАТЬСЯ С ХИЖИНОЙ ТАЙН:</div>
            <a href="mailto:chanelmayor@gmail.com" class="footer-email">chanelmayor@gmail.com</a>
            <div class="cipher-footer">⬟⬟⬟ ◆◆◆</div>
            <div class="copyright">© 2025 - ХИЖИНА ТАЙН ГРАВИТИ ФОЛЗ</div>
            <div class="counter">⏳ СТРАННЫХ СОБЫТИЙ: <span id="randomCounter">4231</span></div>
        </footer>
    </div>
    <div id="imageModal" class="modal"><div class="modal-content"><span class="modal-close" onclick="closeModal()">&times;</span><div class="modal-body"><div class="modal-emoji" id="modalEmoji"></div><h2 id="modalTitle"></h2><p id="modalDesc"></p><p class="modal-story" id="modalStory"></p><div class="modal-year" id="modalYear"></div></div></div></div>
    <script>
        const pages = { about: 'О себе', portfolio: 'Портфолио', observational: 'Наблюдения', story: 'История', backgrounds: 'Фоны', illustrations: 'Иллюстрации' };
        let currentPage = new URLSearchParams(window.location.search).get('page') || 'about';
        const galleryItems = [
            {title:'Тайна леса', category:'landscapes', year:'2023', desc:'Серия работ о существах из Гравити Фолз', img:'🌲', story:'Странные огни в лесу'},
            {title:'Хижина Тайн', category:'landscapes', year:'2023', desc:'Интерьеры загадочного места', img:'🏚️', story:'По реальным фотографиям'},
            {title:'Билл Шифр', category:'characters', year:'2024', desc:'Портреты всеведущего демона', img:'🔺', story:'Появлялся во снах 3 раза'},
            {title:'Пухля', category:'characters', year:'2024', desc:'Хроники короля свиней', img:'🐷', story:'Король позировал лично'}
        ];
        function renderNav() { const nav = document.getElementById('navMenu'); nav.innerHTML = Object.entries(pages).map(([key, title]) => `<li class="nav-item"><a href="?page=${key}" class="nav-link ${currentPage===key?'active':''}" style="--rot:${Math.floor(Math.random()*9)-4}deg">${title}</a></li>`).join(''); }
        function openModal(item) { document.getElementById('modalEmoji').innerHTML=item.img; document.getElementById('modalTitle').innerHTML=item.title; document.getElementById('modalDesc').innerHTML=item.desc; document.getElementById('modalStory').innerHTML='📖 '+item.story; document.getElementById('modalYear').innerHTML='Год: '+item.year; document.getElementById('imageModal').style.display='block'; }
        function closeModal() { document.getElementById('imageModal').style.display='none'; }
        function billClick() { alert(['📐 БИЛЛ ШИФР: "ПРИВЕТ, ДУРАШКА!"','🔺 ТРЕУГОЛЬНИК ВИДИТ ВСЁ!','⬟ РЕАЛЬНОСТЬ - ЭТО ИЛЛЮЗИЯ!','👁️ ОДИН ГЛАЗ ВИДИТ БОЛЬШЕ'][Math.floor(Math.random()*4)]); }
        function revealSecret(cell, num, msg) { if(!cell.classList.contains('revealed')){ cell.classList.add('revealed'); cell.innerHTML='🔍'; let cnt=parseInt(document.getElementById('secretCount')?.innerText||3)+1; if(document.getElementById('secretCount')) document.getElementById('secretCount').innerText=cnt; alert('🎉 СЕКРЕТ! '+msg); if(cnt>=20) alert('ВСЕ 20 СЕКРЕТОВ! БИЛЛ ГОРДИТСЯ!'); } }
        function applyFilters(containerClass, filterAttr){ document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',function(){ let f=this.dataset.filter; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active'); document.querySelectorAll(containerClass).forEach(i=>{ if(f==='all'||i.dataset[filterAttr]===f) i.style.display='block'; else i.style.display='none'; }); })); }
        function renderContent(){
            let html='';
            if(currentPage==='about'){
                html=`<div class="content-section"><h2 class="section-title">📖 ABOUT - ХУДОЖНИК ИЗ ХИЖИНЫ ТАЙН</h2><div class="about-container"><div class="about-image"><div class="polaroid" onclick="this.style.transform='rotate(360deg) scale(1.1)'"><div class="polaroid-image"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff6b9d'/%3E%3Ctext x='50' y='55' font-size='40' text-anchor='middle' fill='white'%3E🎨%3C/text%3E%3C/svg%3E" alt="Chanel"></div><div class="polaroid-caption">Eda</div></div><div class="badge-logo"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,10 90,90 10,90' fill='%2339ff14'/%3E%3Ctext x='50' y='65' font-size='20' text-anchor='middle' fill='black'%3E▲%3C/text%3E%3C/svg%3E"></div><div class="social-links"><a href="#" class="social-link">📷 Instagram</a><a href="#" class="social-link">🐦 Twitter</a><a href="#" class="social-link">🎨 DeviantArt</a></div></div><div class="about-content"><p class="about-greeting">🔆 ДОБРО ПОЖАЛОВАТЬ В ХИЖИНУ ТАЙН! 🔆</p><p><strong>CHANEL MAYOR</strong>, художник и искатель приключений, 12 лет в Гравити Фолз. Рисую гномов, Билла, Пухлю и всё странное вокруг.</p><div class="about-stats"><div class="stat-item"><div class="stat-number">1500+</div><div class="stat-label">работ</div></div><div class="stat-item"><div class="stat-number">12</div><div class="stat-label">лет</div></div><div class="stat-item"><div class="stat-number">247</div><div class="stat-label">наблюдений</div></div></div><div class="skills-list"><span class="skill-tag">✏️ Рисунок</span><span class="skill-tag">💻 Цифра</span><span class="skill-tag">🎨 Акварель</span><span class="skill-tag">🎬 Анимация</span></div><div class="testimonials"><div class="testimonial-item"><p>"Лучший художник в Гравити Фолз!"</p><p class="testimonial-author">- Дядя Стэн</p></div></div></div></div><div class="cipher-box"><div class="cipher-title">🔐 РАСШИФРУЙ:</div><div class="cipher-display">⬟◆⬟◆ ⬟⬟◆⬟</div><div class="cipher-answer" onclick="this.innerHTML='▶ БИЛЛ ШИФР ВСЕГДА РЯДОМ'">🔍 Показать ответ</div></div><div class="easter-egg" onclick="this.innerHTML='👁️ '+this.innerHTML">Остерегайтесь Билла Шифра!</div></div>`;
            } else if(currentPage==='portfolio'){
                html=`<div class="content-section"><h2 class="section-title">🎨 PORTFOLIO + PERSONAL WORK</h2><div class="gallery-filter"><button class="filter-btn active" data-filter="all">Все</button><button class="filter-btn" data-filter="2024">2024</button><button class="filter-btn" data-filter="2023">2023</button></div><div class="gallery-grid" id="galleryGrid"></div><div class="personal-works"><h3 class="section-title">✨ PERSONAL WORK</h3><div class="personal-grid"><div class="personal-card"><div class="personal-number">01</div><h4>Эксперименты с текстурой</h4><p>24 работы • 2024</p></div><div class="personal-card"><div class="personal-number">02</div><h4>Аниматик</h4><p>8 видео</p></div></div></div></div>`;
                setTimeout(()=>{ let grid=document.getElementById('galleryGrid'); if(grid) grid.innerHTML=galleryItems.map(i=>`<div class="gallery-item" data-category="${i.category}" data-year="${i.year}"><div class="gallery-image" onclick='openModal(${JSON.stringify(i).replace(/'/g, "&apos;")})'><div class="gallery-overlay"><span class="gallery-icon">🔍</span></div><div class="gallery-emoji">${i.img}</div><div class="gallery-year">${i.year}</div></div><div class="gallery-info"><h3>${i.title}</h3><p>${i.desc}</p></div></div>`).join(''); applyFilters('.gallery-item','category'); },10);
            } else if(currentPage==='observational'){
                let observations = [{title:'Лесные гномы',desc:'Поведение в лесу',time:'14:30',icon:'👺',loc:'Старый пень'},{title:'Билл Шифр',desc:'В отражениях',time:'03:15',icon:'🔺',loc:'Зеркала'}];
                html=`<div class="content-section"><h2 class="section-title">🔍 OBSERVATIONAL STUDIES</h2><div class="observational-grid" id="obsGrid"></div><div class="journal-notes"><h3>📝 ЗАМЕТКИ НА ПОЛЯХ</h3><div class="daily-cipher"><div class="cipher-code">⬟◆⬟◆ ⬟⬟◆⬟</div><div class="cipher-answer" onclick="this.innerHTML='▶ БИЛЛ СМОТРИТ'">🔍 Ответ</div></div></div></div>`;
                setTimeout(()=>{ let grid=document.getElementById('obsGrid'); if(grid) grid.innerHTML=observations.map(o=>`<div class="observation-card"><div class="observation-time">⏰ ${o.time}</div><div class="observation-icon">${o.icon}</div><h4>${o.title}</h4><p>${o.desc}</p><div class="observation-location">📍 ${o.loc}</div></div>`).join(''); },10);
            } else if(currentPage==='story'){
                let timeline = [{year:'Лето 2012',title:'ПРИБЫТИЕ',desc:'Первые наброски',icon:'🚌',details:'47 набросков'},{year:'2024',title:'НАШИ ДНИ',desc:'Главный проект',icon:'🔍',details:'Скоро'}];
                html=`<div class="content-section"><h2 class="section-title">📚 STORY - ХРОНИКИ ХИЖИНЫ</h2><div class="timeline" id="timelineContainer"></div><div class="journal-page"><div class="journal-page-number">№ 19</div><p class="journal-page-title">САМАЯ ВАЖНАЯ ЗАПИСЬ</p><p>За 12 лет я создал более 1500 работ...</p><div class="invisible-text">ТЫ НАШЁЛ ЭТОТ ТЕКСТ!</div></div><div class="story-stats"><div class="story-stat-item"><div class="story-stat-number">12</div><div class="story-stat-label">лет</div></div></div></div>`;
                setTimeout(()=>{ let cont=document.getElementById('timelineContainer'); if(cont) cont.innerHTML=`<div class="timeline-line"></div>`+timeline.map((t,i)=>`<div class="timeline-item ${i%2?'timeline-right':'timeline-left'}" style="--delay:${i*0.1}s"><div class="timeline-content"><div class="timeline-icon">${t.icon}</div><div class="timeline-year">${t.year}</div><h3>${t.title}</h3><p>${t.desc}</p><div class="timeline-details">${t.details}</div><div class="timeline-dot"></div></div></div>`).join(''); },10);
            } else if(currentPage==='backgrounds'){
                let bg=[{name:'Хижина Тайн',time:'День',desc:'Главное здание',icon:'🏚️',danger:'Безопасно',secret:'🔼'}];
                html=`<div class="content-section"><h2 class="section-title">🌲 BACKGROUNDS - МИР ВОКРУГ</h2><div class="backgrounds-grid" id="bgGrid"></div><div class="mystery-map"><h3>🗺️ КАРТА ТАЙН</h3><p>Найдено: <span id="secretCount">3</span>/20</p><div class="map-grid" id="mapGrid"></div></div></div>`;
                setTimeout(()=>{ document.getElementById('bgGrid').innerHTML=bg.map(b=>`<div class="background-card"><div class="background-image"><span class="background-icon">${b.icon}</span><span class="background-time">${b.time}</span><span class="background-danger">${b.danger}</span><span class="background-secret">${b.secret}</span></div><h3>${b.name}</h3><p>${b.desc}</p></div>`).join(''); let map=''; for(let i=1;i<=20;i++) map+=`<div class="map-cell" onclick="revealSecret(this,${i},'Секрет ${i}')"><div class="map-marker">?</div><div class="map-tooltip">Тайна ${i}</div></div>`; document.getElementById('mapGrid').innerHTML=map; },10);
            } else if(currentPage==='illustrations'){
                let titles=['Портрет Диппера','Мэйбл и Пухля','Билл в лесу','Хижина ночью'];
                html=`<div class="content-section"><h2 class="section-title">✏️ ILLUSTRATIONS - ГАЛЕРЕЯ</h2><div class="illustrations-filter"><button class="filter-btn active" data-filter="all">Все (124)</button><button class="filter-btn" data-filter="2024">2024</button></div><div class="masonry-grid" id="masonryGrid"></div><div class="pagination"><a href="#" class="page-link active">1</a></div></div>`;
                setTimeout(()=>{ let grid=document.getElementById('masonryGrid'); if(grid) grid.innerHTML=titles.map((t,i)=>`<div class="masonry-item portrait" data-year="2024" data-category="portrait"><div class="masonry-image"><div class="masonry-overlay"><span class="masonry-view">🔍</span></div><div class="masonry-year">2024</div><div class="masonry-emoji">🎨</div></div><div class="masonry-info"><h4>${t}</h4><p>№${String(i+1).padStart(3,'0')}</p></div></div>`).join(''); applyFilters('.masonry-item','year'); },10);
            }
            document.getElementById('mainContent').innerHTML=html;
            document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',function(){ let f=this.dataset.filter; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active'); document.querySelectorAll('.gallery-item, .masonry-item').forEach(i=>{ if(f==='all'||i.dataset.category===f||i.dataset.year===f) i.style.display='block'; else i.style.display='none'; }); }));
        }
        window.addEventListener('load',()=>{ renderNav(); renderContent(); document.getElementById('randomCounter').innerText=Math.floor(3000+Math.random()*7000); });
        window.onclick=e=>{ if(e.target===document.getElementById('imageModal')) closeModal(); };
        window.billClick=billClick; window.openModal=openModal; window.closeModal=closeModal; window.revealSecret=revealSecret;
    </script>
</body>
</html>
