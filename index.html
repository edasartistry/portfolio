<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Edasartistry - Gravity Falls Portal | Творческая галерея</title>
    
    <style>
        /* ========== RESET ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* ========== FONTS ========== */
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Patrick+Hand&family=Rock+Salt&display=swap');
        
        :root {
            --primary: #ff6b9d;
            --secondary: #00ccff;
            --accent: #b537f2;
            --pine: #ffd966;
            --sky: #ff99c8;
            --mystery: #a0e7e5;
            --journal: #ffffff;
            --wood: #ffb347;
            --shadow: #4a154b;
            --cipher: #39ff14;
        }
        
        body {
            font-family: 'Patrick Hand', 'Courier New', cursive;
            background-color: var(--shadow);
            background-image: 
                repeating-linear-gradient(45deg,
                    rgba(255,107,157,0.12) 0px,
                    rgba(255,107,157,0.12) 20px,
                    rgba(0,204,255,0.12) 20px,
                    rgba(0,204,255,0.12) 40px
                );
            background-size: 80px 80px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            width: 100%;
        }
        
        /* Эффект старой плёнки */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg,
                rgba(255,105,180,0.05) 0px,
                rgba(255,105,180,0.05) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 9999;
        }
        
        /* ========== ЗВЕЗДОЧКИ ========== */
        .star {
            position: fixed;
            font-size: 24px;
            user-select: none;
            pointer-events: none;
            z-index: 5;
            opacity: 0.6;
            color: var(--cipher);
            text-shadow: 0 0 10px var(--accent);
            filter: drop-shadow(0 0 5px var(--secondary));
            will-change: transform;
            animation: floatStar linear infinite;
        }
        
        @keyframes floatStar {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -20px) rotate(15deg); }
            50% { transform: translate(60px, 0) rotate(30deg); }
            75% { transform: translate(30px, 20px) rotate(15deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        
        /* ========== АНИМАЦИИ ========== */
        @keyframes float {
            0% { transform: translateY(0px) rotate(-2deg); }
            50% { transform: translateY(-15px) rotate(-2deg); }
            100% { transform: translateY(0px) rotate(-2deg); }
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes flicker {
            0% { opacity: 1; }
            25% { opacity: 0.7; }
            50% { opacity: 1; }
            75% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        
        @keyframes glow {
            0% { text-shadow: 0 0 5px var(--accent); }
            50% { text-shadow: 0 0 30px var(--accent), 0 0 50px var(--primary); }
            100% { text-shadow: 0 0 5px var(--accent); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        
        @keyframes appear {
            from { opacity: 0; transform: translateY(30px) rotate(-2deg); }
            to { opacity: 1; transform: translateY(0) rotate(0deg); }
        }
        
        @keyframes cyberpunkGlow {
            0% { filter: drop-shadow(0 0 5px var(--secondary)); }
            50% { filter: drop-shadow(0 0 20px var(--accent)); }
            100% { filter: drop-shadow(0 0 5px var(--secondary)); }
        }
        
        @keyframes kawaiiBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Новая анимация для горизонтальной карусели */
        @keyframes slideLeft {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        /* ========== MAIN CONTAINER ========== */
        .journal-container {
            max-width: 1400px;
            width: 95%;
            margin: 20px auto;
            background: var(--journal);
            background-image: 
                radial-gradient(circle at 20px 20px, rgba(255,217,102,0.25) 2px, transparent 2px),
                linear-gradient(var(--journal), rgba(255,153,200,0.12));
            background-size: 40px 40px, 100%;
            border: 15px solid var(--primary);
            border-radius: 50px;
            box-shadow: 20px 20px 40px rgba(74,21,75,0.5), inset 0 0 80px rgba(181,55,242,0.12);
            position: relative;
            padding: 0 20px;
            animation: appear 0.8s ease-out;
            z-index: 10;
        }
        
        @media (max-width: 768px) {
            .journal-container {
                width: 98%;
                margin: 10px auto;
                border-width: 10px;
                padding: 0 10px;
                border-radius: 40px;
            }
        }
        
        /* Уголки дневника */
        .journal-corner {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 5px solid var(--accent);
            opacity: 0.3;
            z-index: 10;
        }
        
        @media (max-width: 768px) {
            .journal-corner {
                width: 40px;
                height: 40px;
                border-width: 4px;
            }
        }
        
        .corner-tl { top: -8px; left: -8px; border-right: none; border-bottom: none; }
        .corner-tr { top: -8px; right: -8px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: -8px; left: -8px; border-right: none; border-top: none; }
        .corner-br { bottom: -8px; right: -8px; border-left: none; border-top: none; }
        
        /* Билл Шифр */
        .bill-cipher {
            position: fixed;
            width: 100px;
            height: 100px;
            background: var(--cipher);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            opacity: 0.15;
            right: 20px;
            bottom: 20px;
            animation: spin 20s linear infinite, cyberpunkGlow 4s infinite;
            cursor: pointer;
            z-index: 10000;
            transition: all 0.3s;
        }
        
        @media (max-width: 768px) {
            .bill-cipher {
                width: 70px;
                height: 70px;
                right: 10px;
                bottom: 10px;
            }
        }
        
        .bill-cipher:hover {
            opacity: 1;
            animation: shake 0.5s infinite, spin 1s linear infinite;
            width: 120px;
            height: 120px;
        }
        
        .bill-cipher::before {
            content: "▲";
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--shadow);
            font-size: 2em;
            font-weight: bold;
        }
        
        .bill-cipher::after {
            content: "BILL";
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            color: var(--shadow);
            font-size: 0.7em;
            font-weight: bold;
        }
        
        /* ========== HEADER ========== */
        .site-header {
            text-align: center;
            padding: 30px 10px;
            position: relative;
        }
        
        .site-title {
            font-family: 'Rock Salt', cursive;
            font-size: 4em;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 
                4px 4px 0 var(--primary),
                7px 7px 0 var(--secondary),
                10px 10px 10px var(--shadow);
            letter-spacing: 5px;
            transform: rotate(-2deg);
            display: inline-block;
            padding: 0 30px;
            background: rgba(255,255,255,0.2);
            border-radius: 60px;
            margin-bottom: 20px;
            animation: float 5s ease-in-out infinite, cyberpunkGlow 3s infinite;
            border: 3px solid var(--secondary);
            word-break: break-word;
            max-width: 100%;
        }
        
        @media (max-width: 1024px) {
            .site-title { font-size: 3em; }
        }
        
        @media (max-width: 768px) {
            .site-title {
                font-size: 2.2em;
                padding: 10px 20px;
            }
        }
        
        .site-title::before,
        .site-title::after {
            content: "★";
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5em;
            color: var(--cipher);
            text-shadow: 2px 2px 0 var(--secondary);
            animation: spin 6s linear infinite;
        }
        
        .site-title::before { left: -15px; }
        .site-title::after { right: -15px; }
        
        /* ========== НАВИГАЦИЯ ========== */
        .nav-bar {
            margin: 15px 0 20px;
            padding: 20px;
            background: var(--pine);
            border: 6px dashed var(--accent);
            border-radius: 60px;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,204,255,0.5);
            animation: pulse 4s infinite;
            width: 100%;
            overflow: hidden;
        }
        
        @media (max-width: 768px) {
            .nav-bar {
                padding: 15px;
                border-width: 4px;
                border-radius: 40px;
            }
        }
        
        .nav-menu {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            list-style: none;
            width: 100%;
        }
        
        @media (max-width: 768px) {
            .nav-menu {
                flex-direction: column;
                gap: 10px;
            }
            .nav-item {
                width: 100%;
            }
        }
        
        .nav-link {
            display: block;
            padding: 12px 20px;
            background: var(--journal);
            color: var(--primary);
            text-decoration: none;
            font-size: 1.1em;
            font-weight: bold;
            border: 4px solid var(--secondary);
            border-radius: 40px;
            transform: rotate(var(--rot, 0deg));
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 5px 5px 0 var(--secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        
        @media (max-width: 768px) {
            .nav-link {
                white-space: normal;
                text-align: center;
                width: 100%;
                transform: rotate(0deg) !important;
            }
        }
        
        .nav-link:hover {
            transform: rotate(0deg) scale(1.1);
            background: var(--accent);
            color: var(--journal);
            box-shadow: 8px 8px 0 var(--primary);
            border-color: var(--primary);
        }
        
        .nav-link.active {
            background: var(--accent);
            color: var(--journal);
            border-color: var(--primary);
            box-shadow: inset 3px 3px 8px var(--shadow);
            transform: rotate(0deg) scale(1.05);
        }
        
        /* ========== КОНТЕНТ ========== */
        .content-section {
            padding: 30px;
            margin: 30px 0;
            background: rgba(255,255,255,0.8);
            border: 5px dotted var(--primary);
            border-radius: 50px;
            position: relative;
            backdrop-filter: blur(3px);
            animation: appear 0.6s ease-out;
            width: 100%;
            overflow-x: hidden;
            z-index: 20;
        }
        
        @media (max-width: 768px) {
            .content-section {
                padding: 20px 15px;
                margin: 20px 0;
                border-width: 4px;
                border-radius: 30px;
            }
        }
        
        .section-title {
            font-family: 'Special Elite', cursive;
            font-size: 2.5em;
            color: var(--primary);
            text-shadow: 2px 2px 0 var(--accent);
            margin-bottom: 30px;
            border-bottom: 4px solid var(--secondary);
            padding-bottom: 12px;
            display: inline-block;
            position: relative;
            word-break: break-word;
        }
        
        @media (max-width: 768px) {
            .section-title {
                font-size: 1.8em;
            }
        }
        
        .section-title::after {
            content: "⬟";
            position: absolute;
            right: -30px;
            top: 0;
            font-size: 1.2em;
            color: var(--cipher);
            opacity: 0.5;
        }
        
        /* ========== НОВАЯ ГОРИЗОНТАЛЬНАЯ ГАЛЕРЕЯ (движение влево) ========== */
        .horizontal-gallery-container {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            cursor: grab;
            user-select: none;
            padding: 20px 0 30px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        .horizontal-gallery-container:active {
            cursor: grabbing;
        }
        
        .gallery-track {
            display: flex;
            gap: 28px;
            width: max-content;
            padding: 15px 20px;
            animation: none;
            transition: transform 0.1s ease-out;
        }
        
        /* Творческая карточка фото */
        .photo-slide {
            flex: 0 0 auto;
            width: 320px;
            background: var(--journal);
            border-radius: 45px;
            border: 5px solid var(--secondary);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 12px 12px 0 rgba(74,21,75,0.3);
            transform: rotate(var(--rand-rot, -1deg));
            cursor: pointer;
        }
        
        .photo-slide:hover {
            transform: scale(1.02) rotate(0deg);
            border-color: var(--accent);
            box-shadow: 20px 20px 0 var(--primary);
        }
        
        .photo-frame {
            position: relative;
            width: 100%;
            padding-top: 100%; /* 1:1 aspect ratio для аккуратной сетки, но можно адаптивно */
            overflow: hidden;
            background: linear-gradient(145deg, var(--pine), var(--sky));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .photo-frame img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .photo-slide:hover .photo-frame img {
            transform: scale(1.05);
        }
        
        .photo-info {
            padding: 18px 15px 20px;
            background: var(--journal);
        }
        
        .photo-info h3 {
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 6px;
            font-weight: bold;
        }
        
        .photo-info p {
            color: var(--secondary);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        
        .photo-year {
            display: inline-block;
            background: var(--accent);
            color: white;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 30px;
            margin-top: 10px;
        }
        
        /* Кастомный скроллбар */
        .horizontal-gallery-container::-webkit-scrollbar {
            height: 12px;
        }
        .horizontal-gallery-container::-webkit-scrollbar-track {
            background: rgba(255,217,102,0.3);
            border-radius: 20px;
        }
        .horizontal-gallery-container::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 20px;
        }
        
        /* Заглушка для загрузки фото */
        .photo-placeholder {
            background: repeating-linear-gradient(45deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: rgba(255,255,255,0.9);
        }
        
        /* Модальное окно для увеличенного фото */
        .modal {
            display: none;
            position: fixed;
            z-index: 10001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(74,21,75,0.96);
            backdrop-filter: blur(8px);
            animation: flicker 0.3s;
            overflow-y: auto;
            padding: 20px;
        }
        
        .modal-content {
            background: var(--journal);
            margin: 20px auto;
            padding: 20px;
            border: 15px solid var(--secondary);
            border-radius: 60px;
            width: 90%;
            max-width: 700px;
            position: relative;
            animation: appear 0.4s;
            box-shadow: 25px 25px 50px var(--shadow);
            text-align: center;
        }
        
        .modal-close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 2.5em;
            cursor: pointer;
            color: var(--primary);
            transition: all 0.3s;
        }
        
        .modal-close:hover {
            color: var(--cipher);
            transform: scale(1.2) rotate(90deg);
        }
        
        .modal-img {
            max-width: 100%;
            max-height: 55vh;
            border-radius: 30px;
            margin: 20px 0;
            border: 4px solid var(--primary);
            object-fit: contain;
        }
        
        .modal-body h2 {
            font-size: 2em;
            color: var(--primary);
            margin-bottom: 10px;
        }
        
        /* FOOTER */
        .site-footer {
            background: var(--pine);
            text-align: center;
            padding: 40px 20px;
            margin-top: 50px;
            border-top: 12px solid var(--secondary);
            border-radius: 0 0 40px 40px;
            width: 100%;
            z-index: 20;
        }
        
        .footer-email {
            font-size: 2.2em;
            color: var(--accent);
            text-decoration: none;
            border: 4px dashed var(--accent);
            padding: 15px 30px;
            border-radius: 60px;
            display: inline-block;
            margin: 20px 0;
            transition: all 0.4s;
            animation: cyberpunkGlow 2s infinite;
            word-break: break-word;
        }
        
        @media (max-width: 768px) {
            .footer-email {
                font-size: 1.3em;
                padding: 10px 20px;
            }
        }
        
        .footer-email:hover {
            background: var(--accent);
            color: var(--journal);
            transform: scale(1.1) rotate(1deg);
            border-style: solid;
            box-shadow: 15px 15px 0 var(--primary);
        }
        
        .counter {
            display: inline-block;
            background: var(--shadow);
            color: var(--cipher);
            padding: 12px 25px;
            border-radius: 15px;
            font-family: monospace;
            font-size: 1.3em;
            margin-top: 20px;
            border: 3px solid var(--accent);
            animation: flicker 3s infinite;
        }
        
        .footer-text {
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        
        .copyright {
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.7;
        }
        
        .intro-big {
            font-size: 1.8em;
            color: var(--accent);
            margin-bottom: 20px;
        }
        
        /* кнопка добавить фото (демо) */
        .add-photo-note {
            background: rgba(255,107,157,0.2);
            border-radius: 40px;
            padding: 12px;
            margin-top: 20px;
            text-align: center;
            font-style: italic;
            border: 2px dashed var(--secondary);
        }
        
    </style>
</head>
<body>
    <!-- звездочки -->
    <div class="star" style="top: 3%; left: 2%; animation-duration: 14s;">⭐</div>
    <div class="star" style="top: 7%; right: 5%; animation-duration: 18s;">✨</div>
    <div class="star" style="top: 12%; left: 10%; animation-duration: 22s;">🌟</div>
    <div class="star" style="top: 20%; right: 15%; animation-duration: 16s;">💫</div>
    <div class="star" style="top: 25%; left: 20%; animation-duration: 20s;">⭐</div>
    <div class="star" style="top: 35%; right: 25%; animation-duration: 24s;">✨</div>
    <div class="star" style="top: 45%; left: 30%; animation-duration: 19s;">🌟</div>
    <div class="star" style="top: 55%; right: 35%; animation-duration: 21s;">💫</div>
    <div class="star" style="top: 65%; left: 40%; animation-duration: 23s;">⭐</div>
    <div class="star" style="top: 75%; right: 45%; animation-duration: 17s;">✨</div>
    
    <div class="bill-cipher" title="Билл Шифр" onclick="billClick()"></div>
    
    <div class="journal-container">
        <div class="journal-corner corner-tl"></div>
        <div class="journal-corner corner-tr"></div>
        <div class="journal-corner corner-bl"></div>
        <div class="journal-corner corner-br"></div>
        
        <header class="site-header">
            <h1 class="site-title">Edasartistry</h1>
            <nav class="nav-bar">
                <ul class="nav-menu" id="navMenu"></ul>
            </nav>
        </header>
        
        <main id="mainContent"></main>
        
        <footer class="site-footer">
            <div class="footer-text">📬 СВЯЗАТЬСЯ С ХИЖИНОЙ ТАЙН:</div>
            <a href="mailto:chanelmayor@gmail.com" class="footer-email">chanelmayor@gmail.com</a>
            <div class="copyright">© 2025 - ХИЖИНА ТАЙН ГРАВИТИ ФОЛЗ | ФОТОГАЛЕРЕЯ</div>
            <div class="counter">⏳ СТРАННЫХ СОБЫТИЙ: <span id="randomCounter">4231</span></div>
        </footer>
    </div>
    
    <!-- Модальное окно для просмотра фото -->
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-body">
                <img id="modalFullImg" class="modal-img" src="" alt="Full view">
                <h2 id="modalTitle"></h2>
                <p id="modalDesc"></p>
                <div class="modal-year" id="modalYear"></div>
            </div>
        </div>
    </div>
    
    <script>
        // ----------  ФОТОГАЛЕРЕЯ (горизонтальный скролл, плавное движение влево можно мышкой/тачем) ----------
        // Здесь вы сами вставите ваши фото через IMG. Ниже примеры с placeholder + реальные ссылки можно заменить.
        // Структура: массив объектов с полями: src, title, desc, year.
        const photoGalleryData = [
            { src: "https://picsum.photos/id/1015/400/400", title: "Тайна водопада", desc: "Скрытый вход в пещеру за струями воды", year: "2024" },
            { src: "https://picsum.photos/id/104/400/400", title: "Хижина в сумерках", desc: "Огни таинственной лавки", year: "2023" },
            { src: "https://picsum.photos/id/169/400/400", title: "Лесной гном", desc: "Запечатлён во время танца под луной", year: "2024" },
            { src: "https://picsum.photos/id/20/400/400", title: "Код Билла", desc: "Знак на старом дубе", year: "2023" },
            { src: "https://picsum.photos/id/155/400/400", title: "Пухля и Мэйбл", desc: "Король свиней позирует", year: "2024" },
            { src: "https://picsum.photos/id/96/400/400", title: "Ночное озеро", desc: "Отражения треугольников", year: "2022" },
            { src: "https://picsum.photos/id/123/400/400", title: "Секретная страница", desc: "Дневник 3, фрагмент", year: "2023" },
            { src: "https://picsum.photos/id/29/400/400", title: "Каменный истукан", desc: "Статуя Билла в лесу", year: "2024" },
            { src: "https://picsum.photos/id/42/400/400", title: "Венди на закате", desc: "Скейт-культура", year: "2023" }
        ];
        
        // Текущая страница
        let currentPage = new URLSearchParams(window.location.search).get('page') || 'gallery';
        const pages = {
            gallery: 'Фотогалерея',
            about: 'О себе',
            story: 'История'
        };
        
        function renderNav() {
            const nav = document.getElementById('navMenu');
            nav.innerHTML = Object.entries(pages).map(([key, title]) => 
                `<li class="nav-item"><a href="?page=${key}" class="nav-link ${currentPage === key ? 'active' : ''}" style="--rot:${Math.floor(Math.random() * 7) - 3}deg">${title}</a></li>`
            ).join('');
        }
        
        // Функция генерации горизонтальной галереи с возможностью пролистывания влево/вправо, плавное движение
        function buildHorizontalGallery() {
            const container = document.createElement('div');
            container.className = 'horizontal-gallery-container';
            const track = document.createElement('div');
            track.className = 'gallery-track';
            
            photoGalleryData.forEach((photo, idx) => {
                const slide = document.createElement('div');
                slide.className = 'photo-slide';
                const randRot = (Math.random() * 4 - 2).toFixed(1);
                slide.style.setProperty('--rand-rot', `${randRot}deg`);
                
                // рамка изображения
                const frame = document.createElement('div');
                frame.className = 'photo-frame';
                const img = document.createElement('img');
                img.src = photo.src;
                img.alt = photo.title;
                img.loading = "lazy";
                frame.appendChild(img);
                
                const info = document.createElement('div');
                info.className = 'photo-info';
                info.innerHTML = `
                    <h3>${escapeHtml(photo.title)}</h3>
                    <p>${escapeHtml(photo.desc)}</p>
                    <span class="photo-year">📅 ${photo.year}</span>
                `;
                
                slide.appendChild(frame);
                slide.appendChild(info);
                
                // клик для открытия модалки
                slide.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openPhotoModal(photo);
                });
                track.appendChild(slide);
            });
            
            container.appendChild(track);
            
            // добавим возможность перетаскивания мыши для горизонтального скролла
            let isDown = false;
            let startX;
            let scrollLeft;
            container.addEventListener('mousedown', (e) => {
                isDown = true;
                container.style.cursor = 'grabbing';
                startX = e.pageX - container.offsetLeft;
                scrollLeft = container.scrollLeft;
            });
            container.addEventListener('mouseleave', () => {
                isDown = false;
                container.style.cursor = 'grab';
            });
            container.addEventListener('mouseup', () => {
                isDown = false;
                container.style.cursor = 'grab';
            });
            container.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - container.offsetLeft;
                const walk = (x - startX) * 1.5;
                container.scrollLeft = scrollLeft - walk;
            });
            
            return container;
        }
        
        function openPhotoModal(photo) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalFullImg');
            const modalTitle = document.getElementById('modalTitle');
            const modalDesc = document.getElementById('modalDesc');
            const modalYearSpan = document.getElementById('modalYear');
            modalImg.src = photo.src;
            modalTitle.innerText = photo.title;
            modalDesc.innerText = photo.desc;
            modalYearSpan.innerText = `Год: ${photo.year} | ✨ Хижина Тайн`;
            modal.style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }
        
        function billClick() {
            const messages = [
                '📐 БИЛЛ ШИФР: "ПРИВЕТ, ДУРАШКА!"',
                '🔺 ТРЕУГОЛЬНИК ВИДИТ ВСЁ!',
                '⬟ РЕАЛЬНОСТЬ - ЭТО ИЛЛЮЗИЯ!',
                '★ Я ВЕРНУСЬ!'
            ];
            alert(messages[Math.floor(Math.random() * messages.length)]);
            const bill = document.querySelector('.bill-cipher');
            bill.style.animation = 'shake 0.5s, spin 0.5s linear';
            setTimeout(() => {
                bill.style.animation = 'spin 20s linear infinite, cyberpunkGlow 4s infinite';
            }, 500);
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        // рендер контента в зависимости от страницы
        function renderContent() {
            let html = '';
            if(currentPage === 'gallery') {
                html = `<div class="content-section">
                    <h2 class="section-title">📸 КРЕАТИВНАЯ ФОТОГАЛЕРЕЯ</h2>
                    <div class="intro-big">🎞️ ПРОЛИСТЫВАЙ ВЛЕВО-ВПРАВО • ДВИЖЕНИЕ ПЛАВНОЕ</div>
                    <p style="margin-bottom: 20px;">Горизонтальная карусель: тащи мышкой или свайпай. Каждая фотография — тайна, которую вы можете приблизить кликом.</p>
                    <div id="dynamicGallery"></div>
                    <div class="add-photo-note">
                        ✨ Вы можете заменить фото через массив <strong>photoGalleryData</strong> в коде. 
                        Просто укажите свой путь к изображению (src), название и описание. Галерея оживает!
                    </div>
                </div>`;
                document.getElementById('mainContent').innerHTML = html;
                const galleryContainer = document.getElementById('dynamicGallery');
                if(galleryContainer) {
                    const horizGallery = buildHorizontalGallery();
                    galleryContainer.appendChild(horizGallery);
                }
            } 
            else if(currentPage === 'about') {
                html = `<div class="content-section">
                    <h2 class="section-title">📖 О ХУДОЖНИКЕ</h2>
                    <div class="about-container" style="display:flex; flex-wrap:wrap; gap:30px;">
                        <div style="flex:1; min-width:200px; text-align:center;">
                            <div class="polaroid" style="max-width:280px; margin:0 auto;">
                                <div class="polaroid-image" style="height:240px; background:var(--pine); display:flex; align-items:center; justify-content:center; font-size:5em;">🎨</div>
                                <div style="padding:12px;">Edasartistry</div>
                            </div>
                        </div>
                        <div style="flex:2;">
                            <p class="intro-big">🔮 ДОБРО ПОЖАЛОВАТЬ В МИР ТАЙН</p>
                            <p>Меня зовут Edasartistry — художник-иллюстратор, фотограф и исследователь аномалий Гравити Фолз. 12 лет я фиксирую странные события, превращая их в искусство. Моя галерея — это дневник, где каждая фотография хранит криптограмму, призрака или послание Билла.</p>
                            <div class="about-stats" style="display:flex; gap:20px; margin:30px 0; flex-wrap:wrap;">
                                <div class="stat-item">🎞️ 1500+ работ</div>
                                <div class="stat-item">📸 247 наблюдений</div>
                                <div class="stat-item">🔺 3 встречи с Биллом</div>
                            </div>
                            <p>Лови момент: каждая фотография — часть великой тайны. Пролистывай галерею, находи скрытые детали и помни: Билл Шифр наблюдает за тобой.</p>
                        </div>
                    </div>
                </div>`;
                document.getElementById('mainContent').innerHTML = html;
            }
            else if(currentPage === 'story') {
                html = `<div class="content-section">
                    <h2 class="section-title">📜 ХРОНИКИ ХИЖИНЫ</h2>
                    <div class="story-timeline">
                        <p class="intro-big">12 ЛЕТ ЗАПИСЕЙ И ОТКРЫТИЙ</p>
                        <div class="journal-page" style="padding:25px; background:#fff9e8; border-radius:50px; margin-bottom:30px;">
                            <div class="journal-page-number">⭐ 2012-2025</div>
                            <p>«Каждый снимок — это страница моего личного дневника. Я фотографирую светящиеся грибы, тени на стенах, отражения Билла в лужах. Горизонтальная галерея хранит ключи к порталам…»</p>
                            <div class="journal-signature">— Edasartistry</div>
                        </div>
                        <div class="story-stats" style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px;">
                            <div class="story-stat-item">📸 124 уникальных фото</div>
                            <div class="story-stat-item">🌀 38 необъяснимых аномалий</div>
                            <div class="story-stat-item">✨ бесконечность тайн</div>
                        </div>
                    </div>
                </div>`;
                document.getElementById('mainContent').innerHTML = html;
            }
        }
        
        // Обработка кликов навигации
        function bindNavEvents() {
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    const href = link.getAttribute('href');
                    if(href && href.includes('?page=')) {
                        e.preventDefault();
                        currentPage = href.split('?page=')[1];
                        history.pushState({}, '', href);
                        renderNav();
                        renderContent();
                        bindNavEvents();
                    }
                });
            });
        }
        
        window.addEventListener('load', () => {
            renderNav();
            renderContent();
            bindNavEvents();
            document.getElementById('randomCounter').innerText = Math.floor(3000 + Math.random() * 7000);
            
            // Konami code Easter egg
            let konami = [];
            document.addEventListener('keydown', (e) => {
                konami.push(e.keyCode);
                if(konami.toString().indexOf('38,38,40,40,37,39,37,39,66,65') >= 0) {
                    alert('🎉 СЕКРЕТ АКТИВИРОВАН! БИЛЛ ПРИВЕТСТВУЕТ ТЕБЯ!');
                    document.body.style.animation = 'flicker 0.1s infinite';
                    setTimeout(() => document.body.style.animation = '', 1000);
                    konami = [];
                }
            });
            
            console.log('%c🔍 СТРАНИЦА 19: БИЛЛ ШИФР СМОТРИТ НА ТВОИ ФОТО', 'color: #39ff14; font-size: 16px');
        });
        
        window.closeModal = closeModal;
        window.billClick = billClick;
        window.onclick = (e) => { if(e.target === document.getElementById('imageModal')) closeModal(); };
    </script>
</body>
</html>
