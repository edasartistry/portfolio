<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Edasartistry · Секретные фото</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Patrick+Hand&family=Rock+Salt&display=swap');

        :root {
            --primary: #ff6b9d;
            --secondary: #00ccff;
            --accent: #b537f2;
            --pine: #ffd966;
            --sky: #ff99c8;
            --mystery: #a0e7e5;
            --journal: #ffffff;
            --wood: #ffb347;
            --shadow: #4a154b;
            --cipher: #39ff14;
        }

        body {
            font-family: 'Patrick Hand', 'Courier New', cursive;
            background-color: var(--shadow);
            background-image: 
                repeating-linear-gradient(45deg,
                    rgba(255,107,157,0.12) 0px,
                    rgba(255,107,157,0.12) 20px,
                    rgba(0,204,255,0.12) 20px,
                    rgba(0,204,255,0.12) 40px
                );
            background-size: 80px 80px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            width: 100%;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg,
                rgba(255,105,180,0.05) 0px,
                rgba(255,105,180,0.05) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(-2deg); }
            50% { transform: translateY(-15px) rotate(-2deg); }
            100% { transform: translateY(0px) rotate(-2deg); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes appear {
            from { opacity: 0; transform: translateY(30px) rotate(-2deg); }
            to { opacity: 1; transform: translateY(0) rotate(0deg); }
        }

        @keyframes cyberpunkGlow {
            0% { filter: drop-shadow(0 0 5px var(--secondary)); }
            50% { filter: drop-shadow(0 0 20px var(--accent)); }
            100% { filter: drop-shadow(0 0 5px var(--secondary)); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .journal-container {
            max-width: 1400px;
            width: 95%;
            margin: 20px auto;
            background: var(--journal);
            background-image: 
                radial-gradient(circle at 20px 20px, rgba(255,217,102,0.25) 2px, transparent 2px),
                linear-gradient(var(--journal), rgba(255,153,200,0.12));
            background-size: 40px 40px, 100%;
            border: 15px solid var(--primary);
            border-radius: 50px;
            box-shadow: 20px 20px 40px rgba(74,21,75,0.5), inset 0 0 80px rgba(181,55,242,0.12);
            position: relative;
            padding: 0 20px;
            animation: appear 0.8s ease-out;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .journal-container {
                width: 98%;
                margin: 10px auto;
                border-width: 10px;
                padding: 0 10px;
                border-radius: 40px;
            }
        }

        .journal-corner {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 5px solid var(--accent);
            opacity: 0.3;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .journal-corner {
                width: 40px;
                height: 40px;
                border-width: 4px;
            }
        }

        .corner-tl { top: -8px; left: -8px; border-right: none; border-bottom: none; }
        .corner-tr { top: -8px; right: -8px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: -8px; left: -8px; border-right: none; border-top: none; }
        .corner-br { bottom: -8px; right: -8px; border-left: none; border-top: none; }

        .bill-cipher {
            position: fixed;
            width: 100px;
            height: 100px;
            background: var(--cipher);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            opacity: 0.15;
            right: 20px;
            bottom: 20px;
            animation: spin 20s linear infinite, cyberpunkGlow 4s infinite;
            cursor: pointer;
            z-index: 10000;
            transition: all 0.3s;
        }

        @media (max-width: 768px) {
            .bill-cipher {
                width: 70px;
                height: 70px;
                right: 10px;
                bottom: 10px;
            }
        }

        .bill-cipher:hover {
            opacity: 1;
            animation: shake 0.5s infinite, spin 1s linear infinite;
            width: 120px;
            height: 120px;
        }

        .bill-cipher::before {
            content: "▲";
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--shadow);
            font-size: 2em;
            font-weight: bold;
        }

        .bill-cipher::after {
            content: "BILL";
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            color: var(--shadow);
            font-size: 0.7em;
            font-weight: bold;
        }

        .site-header {
            text-align: center;
            padding: 30px 10px 20px;
            position: relative;
        }

        .site-title {
            font-family: 'Rock Salt', cursive;
            font-size: 3.5em;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 
                4px 4px 0 var(--primary),
                7px 7px 0 var(--secondary),
                10px 10px 10px var(--shadow);
            letter-spacing: 5px;
            transform: rotate(-2deg);
            display: inline-block;
            padding: 0 30px;
            background: rgba(255,255,255,0.2);
            border-radius: 60px;
            margin-bottom: 10px;
            animation: float 5s ease-in-out infinite, cyberpunkGlow 3s infinite;
            border: 3px solid var(--secondary);
            word-break: break-word;
        }

        @media (max-width: 768px) {
            .site-title {
                font-size: 2.2em;
                padding: 10px 20px;
            }
        }

        .nav-bar {
            margin: 15px 0 20px;
            padding: 15px 20px;
            background: var(--pine);
            border: 6px dashed var(--accent);
            border-radius: 60px;
            box-shadow: inset 0 0 30px rgba(0,204,255,0.5);
            animation: pulse 4s infinite;
        }

        .nav-menu {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            list-style: none;
        }

        .nav-link {
            display: inline-block;
            padding: 12px 25px;
            background: var(--journal);
            color: var(--primary);
            text-decoration: none;
            font-size: 1.2em;
            font-weight: bold;
            border: 4px solid var(--secondary);
            border-radius: 40px;
            transform: rotate(var(--rot, 0deg));
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 5px 5px 0 var(--secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-link:hover {
            transform: rotate(0deg) scale(1.1);
            background: var(--accent);
            color: var(--journal);
            box-shadow: 8px 8px 0 var(--primary);
            border-color: var(--primary);
        }

        .nav-link.active {
            background: var(--accent);
            color: var(--journal);
            border-color: var(--primary);
            box-shadow: inset 3px 3px 8px var(--shadow);
        }

        .content-section {
            padding: 30px;
            margin: 20px 0 30px;
            background: rgba(255,255,255,0.8);
            border: 5px dotted var(--primary);
            border-radius: 50px;
            backdrop-filter: blur(3px);
            animation: appear 0.6s ease-out;
        }

        @media (max-width: 768px) {
            .content-section {
                padding: 20px 15px;
                border-width: 4px;
                border-radius: 30px;
            }
        }

        .section-title {
            font-family: 'Special Elite', cursive;
            font-size: 2.5em;
            color: var(--primary);
            text-shadow: 2px 2px 0 var(--accent);
            margin-bottom: 30px;
            border-bottom: 4px solid var(--secondary);
            padding-bottom: 12px;
            display: inline-block;
            position: relative;
        }

        .section-title::after {
            content: "⬟";
            position: absolute;
            right: -30px;
            top: 0;
            font-size: 1.2em;
            color: var(--cipher);
            opacity: 0.5;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin: 30px 0;
        }

        .photo-card {
            background: var(--journal);
            border: 5px solid var(--secondary);
            border-radius: 35px;
            overflow: hidden;
            transform: rotate(var(--rot, -1deg));
            transition: all 0.4s;
            box-shadow: 10px 10px 0 var(--primary);
            animation: appear 0.5s ease-out;
            cursor: pointer;
        }

        .photo-card:nth-child(even) {
            --rot: 2deg;
        }

        .photo-card:hover {
            transform: rotate(0deg) scale(1.02);
            box-shadow: 15px 15px 0 var(--accent);
            border-color: var(--primary);
        }

        .photo-frame {
            aspect-ratio: 1 / 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, var(--pine), var(--sky));
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .photo-card:hover .photo-frame img {
            transform: scale(1.1);
        }

        .photo-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(74,21,75,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 3;
        }

        .photo-card:hover .photo-overlay {
            opacity: 1;
        }

        .photo-icon {
            font-size: 3em;
            color: var(--cipher);
            animation: kawaiiBounce 1s infinite;
        }

        @keyframes kawaiiBounce {
            0%,100%{transform:scale(1);}
            50%{transform:scale(1.1);}
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 10001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(74,21,75,0.94);
            overflow-y: auto;
            padding: 20px;
        }

        .modal-content {
            background: var(--journal);
            margin: 20px auto;
            padding: 30px;
            border: 15px solid var(--secondary);
            border-radius: 60px;
            width: 90%;
            max-width: 900px;
            position: relative;
            animation: appear 0.4s;
            box-shadow: 25px 25px 50px var(--shadow);
            text-align: center;
        }

        .modal-close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 2.5em;
            cursor: pointer;
            color: var(--primary);
            transition: all 0.3s;
            z-index: 10;
        }

        .modal-close:hover {
            color: var(--cipher);
            transform: scale(1.2) rotate(90deg);
        }

        .modal-image {
            max-width: 100%;
            max-height: 75vh;
            border-radius: 30px;
            border: 5px solid var(--primary);
            box-shadow: 10px 10px 0 var(--accent);
        }

        .site-footer {
            background: var(--pine);
            text-align: center;
            padding: 40px 20px;
            margin-top: 30px;
            border-top: 12px solid var(--secondary);
            border-radius: 0 0 40px 40px;
        }

        .footer-email {
            font-size: 2.2em;
            color: var(--accent);
            text-decoration: none;
            border: 4px dashed var(--accent);
            padding: 15px 30px;
            border-radius: 60px;
            display: inline-block;
            margin: 20px 0;
            transition: all 0.4s;
            animation: cyberpunkGlow 2s infinite;
        }

        @media (max-width: 768px) {
            .footer-email {
                font-size: 1.3em;
                padding: 10px 20px;
            }
        }

        .footer-email:hover {
            background: var(--accent);
            color: var(--journal);
            transform: scale(1.1) rotate(1deg);
            border-style: solid;
            box-shadow: 15px 15px 0 var(--primary);
        }

        .cipher-footer {
            font-family: monospace;
            font-size: 1.2em;
            margin: 20px 0;
            color: rgba(181,55,242,0.8);
        }

        .copyright {
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.7;
        }

        .counter {
            display: inline-block;
            background: var(--shadow);
            color: var(--cipher);
            padding: 12px 25px;
            border-radius: 15px;
            font-family: monospace;
            font-size: 1.3em;
            margin-top: 20px;
            border: 3px solid var(--accent);
        }

        .star {
            position: fixed;
            font-size: 24px;
            user-select: none;
            pointer-events: none;
            z-index: 5;
            opacity: 0.6;
            color: var(--cipher);
            text-shadow: 0 0 10px var(--accent);
            animation: floatStar linear infinite;
        }

        @keyframes floatStar {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -20px) rotate(15deg); }
            50% { transform: translate(60px, 0) rotate(30deg); }
            75% { transform: translate(30px, 20px) rotate(15deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
    </style>
</head>
<body>
    <div class="star" style="top: 3%; left: 2%; animation-duration: 14s;">⭐</div>
    <div class="star" style="top: 7%; right: 5%; animation-duration: 18s;">✨</div>
    <div class="star" style="top: 20%; right: 15%; animation-duration: 16s;">💫</div>
    <div class="star" style="top: 35%; left: 20%; animation-duration: 22s;">🌟</div>
    <div class="star" style="top: 55%; right: 30%; animation-duration: 20s;">⭐</div>
    <div class="star" style="top: 75%; left: 10%; animation-duration: 19s;">✨</div>

    <div class="bill-cipher" title="Билл Шифр" onclick="billClick()"></div>

    <div class="journal-container">
        <div class="journal-corner corner-tl"></div>
        <div class="journal-corner corner-tr"></div>
        <div class="journal-corner corner-bl"></div>
        <div class="journal-corner corner-br"></div>

        <header class="site-header">
            <h1 class="site-title">📸 Hidden Gallery</h1>
            <nav class="nav-bar">
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link" style="--rot:-2deg">← Back to Portfolio</a></li>
                    <li><a href="#" class="nav-link active" style="--rot:1deg">Gallery</a></li>
                    <li><a href="#" class="nav-link" style="--rot:-3deg" onclick="alert('You discovered my private work ✨')">Secret</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <div class="content-section">
                <h2 class="section-title">🔺 Hidden Archive</h2>
                
                <div class="photo-grid">
                    
                    <!-- ФОТО 1-20 (замени src на свои) -->
                    <div class="photo-card" style="--rot:-1deg" onclick="openModal(this)"><div class="photo-frame"><img src="img/1.jpg" alt="Фото 1" loading="lazy"><div class="photo-overlay"><span class="photo-icon">🔍</span></div></div></div>
                    <div class="photo-card" style="--rot:2deg" onclick="openModal(this)"><div class="photo-frame"><img src="img/2.jpg" alt="Фото 2" loading="lazy"><div class="photo-overlay"><span class="photo-icon">🔍</span></div></div></div>
                                  <div class="photo-card" style="--rot:1deg" onclick="openModal(this)"><div class="photo-frame"><img src="img/4.jpg" alt="Фото 4" loading="lazy"><div class="photo-overlay"><span class="photo-icon">🔍</span></div></div></div>
                    <div class="photo-card" style="--rot:-2deg" onclick="openModal(this)"><div class="photo-frame"><img src="img/5.jpg" alt="Фото 5" loading="lazy"><div class="photo-overlay"><span class="photo-icon">🔍</span></div></div></div>
                                  <div class="photo-card" style="--rot:-1deg" onclick="openModal(this)"><div class="photo-frame"><img src="img/7.jpg" alt="Фото 7" loading="lazy"><div class="photo-overlay"><span class="photo-icon">🔍</span></div></div></div>
                                   <div class="photo-card" style="--rot:3deg" onclick="openModal(this)"><div class="photo-frame"><img src="img/8.jpg" alt="Фото 8" loading="lazy"><div class="photo-overlay"><span class="photo-icon">🔍</span></div></div></div>
                      <div class="photo-card" style="--rot:-1deg" onclick="openModal(this)"><div class="photo-frame"><img src="img/3.jpg" alt="Фото 3" loading="lazy"><div class="photo-overlay"><span class="photo-icon">🔍</span></div></div></div>

                    <div class="photo-card" style="--rot:-2deg" onclick="openModal(this)"><div class="photo-frame"><img src="img/9.jpg" alt="Фото 9" loading="lazy"><div class="photo-overlay"><span class="photo-icon">🔍</span></div></div></div>
                    <div class="photo-card" style="--rot:1deg" onclick="openModal(this)"><div class="photo-frame"><img src="img/10.jpg" alt="Фото 10" loading="lazy"><div class="photo-overlay"><span class="photo-icon">🔍</span></div></div></div>
                    <div class="photo-card" style="--rot:-1deg" onclick="openModal(this)"><div class="photo-frame"><img src="img/11.jpg" alt="Фото 11" loading="lazy"><div class="photo-overlay"><span class="photo-icon">🔍</span></div></div></div>
                                        <div class="photo-card" style="--rot:-2deg" onclick="openModal(this)"><div class="photo-frame"><img src="img/13.jpg" alt="Фото 13" loading="lazy"><div class="photo-overlay"><span class="photo-icon">🔍</span></div></div></div>
                    <div class="photo-card" style="--rot:1deg" onclick="openModal(this)"><div class="photo-frame"><img src="img/14.jpg" alt="Фото 14" loading="lazy"><div class="photo-overlay"><span class="photo-icon">🔍</span></div></div></div>
                                    <div class="photo-card" style="--rot:2deg" onclick="openModal(this)"><div class="photo-frame"><img src="img/16.jpg" alt="Фото 16" loading="lazy"><div class="photo-overlay"><span class="photo-icon">🔍</span></div></div></div>
                   
                </div>
            </div>
        </main>

        <footer class="site-footer">
               <div class="copyright">Enter the Secret Archive ✨</div>
            <div class="footer-text">📬 Contact me :</div>
            <a href="mailto:gafureda@gmail.com" class="footer-email">gafureda@gmail.com</a>
            <div class="cipher-footer">⬟⬟⬟ ◆◆◆</div>
         
            <div class="counter">That’s all for now… 👀</div>
        </footer>
    </div>

    <div id="photoModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <img id="modalImage" class="modal-image" src="" alt="">
        </div>
    </div>

    <script>
        function openModal(card) {
            const img = card.querySelector('img');
            document.getElementById('modalImage').src = img.src;
            document.getElementById('modalImage').alt = img.alt;
            document.getElementById('photoModal').style.display = 'block';
            
            const bill = document.querySelector('.bill-cipher');
            if(bill) {
                bill.style.animation = 'shake 0.3s, spin 0.8s linear';
                setTimeout(() => bill.style.animation = 'spin 20s linear infinite, cyberpunkGlow 4s infinite', 400);
            }
        }

        function closeModal() {
            document.getElementById('photoModal').style.display = 'none';
        }



        window.onclick = function(event) {
            const modal = document.getElementById('photoModal');
            if (event.target === modal) modal.style.display = 'none';
        };

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        console.log('%c📸 СЕКРЕТНЫЙ ФОТО-АРХИВ', 'font-size:22px; color:#ff6b9d;');
        console.log('%c⬟ Подключай фото в img/1.jpg → img/20.jpg', 'font-size:14px; color:#39ff14');

        let konami = [];
        document.addEventListener('keydown', (e) => {
            konami.push(e.keyCode);
            if (konami.toString().indexOf('38,38,40,40,37,39,37,39,66,65') >= 0) {
                alert('🎉 КОД АКТИВИРОВАН!');
                document.querySelectorAll('.photo-card').forEach((card, i) => {
                    setTimeout(() => {
                        card.style.transform = 'rotate(360deg) scale(1.1)';
                        card.style.transition = 'all 0.8s';
                        setTimeout(() => card.style.transform = '', 800);
                    }, i*50);
                });
                konami = [];
            }
        });

        setInterval(() => {
            if(Math.random() < 0.1) {
                const star = document.createElement('div');
                star.className = 'star';
                star.innerHTML = ['⭐','✨','🌟','💫'][Math.floor(Math.random()*4)];
                star.style.top = Math.random()*100 + '%';
                star.style.left = Math.random()*100 + '%';
                star.style.animationDuration = (10+Math.random()*20)+'s';
                star.style.fontSize = (15+Math.random()*25)+'px';
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 30000);
            }
        }, 2000);
    </script>
</body>
</html>
